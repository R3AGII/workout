<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800;900&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg:#0a0a0f; --bg2:#12121a; --card:#1a1a28; --card-h:#222236;
  --border:#2a2a40; --fg:#e8e8f0; --fgd:#8888a0;
  --accent:#ff6b35; --accent2:#ff9f1c; --glow:rgba(255,107,53,.25);
  --danger:#ef4444; --success:#22c55e;
  --d1:#ff6b35; --d2:#ff9f1c; --d3:#22c55e; --d4:#3b82f6;
  --d5:#a855f7; --d6:#ec4899; --d7:#14b8a6;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}

/* พื้นหลัง */
.bg-fx{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-fx .b{position:absolute;border-radius:50%;filter:blur(120px);opacity:.12;animation:bf 14s ease-in-out infinite alternate}
.bg-fx .b:nth-child(1){width:500px;height:500px;background:var(--accent);top:-120px;left:-80px}
.bg-fx .b:nth-child(2){width:400px;height:400px;background:var(--accent2);bottom:-80px;right:-80px;animation-delay:-5s}
.bg-fx .b:nth-child(3){width:300px;height:300px;background:#a855f7;top:40%;left:45%;animation-delay:-9s}
@keyframes bf{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,-30px) scale(1.15)}}

.app{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:16px 16px 130px}
header{text-align:center;padding:24px 0 8px}
header h1{font-family:'Kanit';font-weight:900;font-size:1.9rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--fgd);font-size:.82rem;margin-top:2px}

/* แท็บ */
.tabs{display:flex;gap:3px;background:var(--bg2);border-radius:14px;padding:3px;margin:16px 0;border:1px solid var(--border)}
.tbtn{flex:1;padding:10px 4px;border:none;background:0;color:var(--fgd);font-family:'Kanit';font-weight:600;font-size:.82rem;border-radius:11px;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:6px}
.tbtn.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 18px var(--glow)}
.tbtn:not(.on):hover{color:var(--fg);background:var(--card)}
.tcon{display:none}.tcon.on{display:block}

/* เลือกวัน */
.day-sel{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}
.day-sel::-webkit-scrollbar{display:none}
.dchip{flex-shrink:0;padding:7px 14px;border-radius:9px;border:2px solid var(--border);background:var(--card);color:var(--fgd);font-family:'Kanit';font-weight:600;font-size:.82rem;cursor:pointer;transition:.25s;display:flex;align-items:center;gap:5px}
.dchip .cnt{background:rgba(255,255,255,.1);padding:1px 6px;border-radius:5px;font-size:.72rem}
.dchip.on{color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(0,0,0,.3)}
.dchip[data-d="1"].on{background:var(--d1)}.dchip[data-d="2"].on{background:var(--d2)}.dchip[data-d="3"].on{background:var(--d3)}
.dchip[data-d="4"].on{background:var(--d4)}.dchip[data-d="5"].on{background:var(--d5)}.dchip[data-d="6"].on{background:var(--d6)}.dchip[data-d="7"].on{background:var(--d7)}

/* ปุ่มเพิ่ม */
.addbtn{width:100%;padding:13px;border:2px dashed var(--border);border-radius:13px;background:0;color:var(--fgd);font-family:'Kanit';font-weight:600;font-size:.9rem;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
.addbtn:hover{border-color:var(--accent);color:var(--accent);background:rgba(255,107,53,.04)}

/* การ์ด */
.elist{display:flex;flex-direction:column;gap:9px}
.ecard{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;transition:.3s;animation:si .3s ease}
.ecard:hover{border-color:rgba(255,107,53,.3);background:var(--card-h)}
@keyframes si{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.etop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ename{font-family:'Kanit';font-weight:800;font-size:1rem;color:var(--fg);flex:1;cursor:pointer;padding:3px 7px;border-radius:7px;border:1px solid transparent;transition:.2s;outline:none;min-width:0;word-break:break-word}
.ename:hover{background:rgba(255,255,255,.04)}.ename:focus{background:var(--bg2);border-color:var(--accent);cursor:text}
.sbtn{width:32px;height:32px;border-radius:9px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:.2s;flex-shrink:0;margin-left:5px}
.delb{background:rgba(239,68,68,.1);color:var(--danger)}.delb:hover{background:var(--danger);color:#fff;transform:scale(1.1)}
.dupb{background:rgba(34,197,94,.1);color:var(--success)}.dupb:hover{background:var(--success);color:#fff;transform:scale(1.1)}
.estats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.sbox{background:var(--bg2);border-radius:9px;padding:9px;text-align:center;border:1px solid transparent;transition:.2s}
.sbox:hover{border-color:var(--border)}
.slbl{font-size:.6rem;color:var(--fgd);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.sval{font-family:'Kanit';font-weight:800;font-size:1.1rem;color:var(--fg);cursor:pointer;padding:2px 3px;border-radius:5px;border:1px solid transparent;outline:none;transition:.2s;display:inline-block}
.sval:hover{background:rgba(255,255,255,.04)}.sval:focus{background:var(--bg);border-color:var(--accent);cursor:text}
.sunit{font-size:.65rem;color:var(--fgd);font-weight:400}

/* สรุป */
.sbar{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.sitem{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 8px;text-align:center}
.snum{font-family:'Kanit';font-weight:900;font-size:1.25rem;color:var(--accent)}
.slbl2{font-size:.6rem;color:var(--fgd);text-transform:uppercase;letter-spacing:.4px;margin-top:1px}

/* วันที่ในประวัติ */
.dhdr{font-family:'Kanit';font-weight:600;font-size:.82rem;color:var(--fgd);padding:7px 3px 5px;display:flex;align-items:center;gap:7px}
.dhdr::after{content:'';flex:1;height:1px;background:var(--border)}
.ddel{background:none;border:none;color:var(--fgd);cursor:pointer;font-size:.72rem;padding:3px 5px;border-radius:5px;transition:.2s}
.ddel:hover{color:var(--danger);background:rgba(239,68,68,.1)}
.drow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dtit{font-family:'Kanit';font-weight:800;font-size:1.05rem}
.clrbtn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:0;color:var(--fgd);font-family:'Sarabun';font-size:.72rem;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:4px}
.clrbtn:hover{border-color:var(--danger);color:var(--danger);background:rgba(239,68,68,.04)}
.empty{text-align:center;padding:45px 20px;color:var(--fgd)}
.empty i{font-size:2.8rem;margin-bottom:10px;opacity:.25;display:block}
.empty p{font-size:.88rem}

/* ===== โมดัล ===== */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.mo.show{display:flex}
.md{background:var(--bg2);border-radius:22px 22px 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:22px 18px 36px;animation:su .3s ease;border:1px solid var(--border);border-bottom:none}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:38px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 18px}
.mt{font-family:'Kanit';font-weight:800;font-size:1.2rem;margin-bottom:18px}

/* ค้นหา */
.sbox2{position:relative;margin-bottom:14px}
.sbox2 i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--fgd);font-size:.85rem}
.sinp{width:100%;padding:12px 14px 12px 42px;border-radius:11px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-family:'Sarabun';font-size:.95rem;outline:none;transition:.2s}
.sinp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}

/* หมวดหมู่ */
.cchips{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;scrollbar-width:none}
.cchips::-webkit-scrollbar{display:none}
.cc{flex-shrink:0;padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:0;color:var(--fgd);font-family:'Sarabun';font-size:.78rem;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.cc.on{background:var(--accent);border-color:var(--accent);color:#fff}
.cc:not(.on):hover{border-color:var(--accent);color:var(--accent)}

/* รายการท่า */
.epkl{display:flex;flex-direction:column;gap:3px;max-height:35vh;overflow-y:auto;padding-right:3px}
.epkl::-webkit-scrollbar{width:3px}.epkl::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.epki{padding:10px 12px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:.2s;border:1px solid transparent}
.epki:hover{background:var(--card);border-color:var(--border)}
.epki:active{transform:scale(.98)}
.pkn{font-weight:600;font-size:.9rem}.pkc{font-size:.68rem;color:var(--fgd);margin-top:1px}
.pkico{width:34px;height:34px;border-radius:9px;background:rgba(255,107,53,.1);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.82rem;flex-shrink:0}

/* ฟอร์มรายละเอียด */
.dform{display:none;margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}
.dform.show{display:block}
.frow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.fg{margin-bottom:14px}
.fl{display:block;font-size:.75rem;color:var(--fgd);margin-bottom:5px;font-weight:600}
.finp{width:100%;padding:11px 12px;border-radius:9px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-family:'Kanit';font-weight:600;font-size:.95rem;outline:none;transition:.2s;text-align:center}
.finp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.finp::placeholder{color:var(--fgd);font-weight:400;font-size:.82rem}
.sbtn2{width:100%;padding:13px;border:none;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'Kanit';font-weight:800;font-size:1rem;cursor:pointer;transition:.3s;box-shadow:0 4px 18px var(--glow)}
.sbtn2:hover{transform:translateY(-2px);box-shadow:0 6px 26px var(--glow)}.sbtn2:active{transform:translateY(0)}

/* เลือกวันในโมดัล */
.dpk{display:flex;gap:5px;margin-bottom:14px}
.dpb{flex:1;padding:9px 3px;border-radius:9px;border:2px solid var(--border);background:0;color:var(--fgd);font-family:'Kanit';font-weight:800;font-size:.88rem;cursor:pointer;transition:.2s}
.dpb.on{color:#fff;border-color:transparent}
.dpb[data-v="1"].on{background:var(--d1)}.dpb[data-v="2"].on{background:var(--d2)}.dpb[data-v="3"].on{background:var(--d3)}
.dpb[data-v="4"].on{background:var(--d4)}.dpb[data-v="5"].on{background:var(--d5)}.dpb[data-v="6"].on{background:var(--d6)}.dpb[data-v="7"].on{background:var(--d7)}

/* date input */
.datew{margin-bottom:14px}
.dinp{width:100%;padding:11px 12px;border-radius:9px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-family:'Sarabun';font-size:.95rem;outline:none;transition:.2s}
.dinp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);color:var(--fg);padding:11px 22px;border-radius:11px;font-family:'Kanit';font-weight:600;font-size:.88rem;border:1px solid var(--border);z-index:200;transition:transform .3s;box-shadow:0 10px 36px rgba(0,0,0,.4);display:flex;align-items:center;gap:7px;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--success)}.toast.ok i{color:var(--success)}
.toast.bad{border-color:var(--danger)}.toast.bad i{color:var(--danger)}

/* ===== Progressive Overload ===== */
.po-exc{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;scrollbar-width:none}
.po-exc::-webkit-scrollbar{display:none}
.po-chip{flex-shrink:0;padding:7px 13px;border-radius:9px;border:1px solid var(--border);background:var(--card);color:var(--fgd);font-family:'Sarabun';font-size:.8rem;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.po-chip .poc{background:rgba(255,255,255,.08);padding:1px 6px;border-radius:5px;font-size:.68rem}
.po-chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.po-chip.on .poc{background:rgba(255,255,255,.25)}
.po-toggle{display:flex;gap:3px;background:var(--bg2);border-radius:9px;padding:3px;margin-bottom:16px;border:1px solid var(--border)}
.po-tbtn{flex:1;padding:8px;border:none;background:0;color:var(--fgd);font-family:'Kanit';font-weight:600;font-size:.82rem;border-radius:7px;cursor:pointer;transition:.2s}
.po-tbtn.on{background:var(--accent);color:#fff}

/* กราฟ */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;overflow:hidden}
.chart-area{position:relative;height:260px;display:flex}
.chart-y{display:flex;flex-direction:column;justify-content:space-between;padding:4px 8px 28px 0;width:52px;text-align:right}
.chart-y span{font-size:.6rem;color:var(--fgd);font-family:'Kanit';font-weight:600}
.chart-body{flex:1;position:relative;border-left:1px solid var(--border);border-bottom:1px solid var(--border)}
.chart-grid{position:absolute;inset:0;bottom:28px}
.chart-grid .gl{position:absolute;left:0;width:100%;height:1px;background:var(--border);opacity:.4}
.chart-bars{position:absolute;bottom:28px;left:0;right:0;top:0;display:flex;align-items:flex-end;justify-content:space-evenly;padding:0 8px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;max-width:60px}
.pct-badge{font-family:'Kanit';font-weight:700;font-size:.58rem;padding:2px 4px;border-radius:4px;margin-bottom:2px;white-space:nowrap;animation:si .3s ease}
.pct-badge.up{background:rgba(34,197,94,.15);color:var(--success)}
.pct-badge.dn{background:rgba(239,68,68,.15);color:var(--danger)}
.pct-badge.eq{background:rgba(136,136,160,.1);color:var(--fgd)}
.bar-v{font-family:'Kanit';font-weight:800;font-size:.68rem;color:var(--fg);margin-bottom:2px;white-space:nowrap}
.cbar{width:60%;border-radius:5px 5px 0 0;background:linear-gradient(to top,var(--accent),var(--accent2));min-height:3px;transition:height .6s cubic-bezier(.4,0,.2,1)}
.cbar.best{box-shadow:0 0 14px var(--glow)}
.chart-xl{position:absolute;bottom:0;left:0;right:0;height:28px;display:flex;justify-content:space-evenly;padding:0 8px}
.xl{flex:1;max-width:60px;text-align:center;font-size:.58rem;color:var(--fgd);line-height:28px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* PO stats */
.po-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.po-si{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px}
.po-sv{font-family:'Kanit';font-weight:900;font-size:1.15rem}
.po-sl{font-size:.62rem;color:var(--fgd);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.po-sv.up{color:var(--success)}.po-sv.dn{color:var(--danger)}

/* ===== Rest Timer ===== */
.rt-fab{position:fixed;bottom:24px;right:24px;z-index:90;width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:1.3rem;cursor:pointer;box-shadow:0 4px 20px var(--glow);transition:.3s;display:flex;align-items:center;justify-content:center}
.rt-fab:hover{transform:scale(1.08)}.rt-fab:active{transform:scale(.95)}
.rt-fab.pulse{animation:rpulse 1s ease infinite}
@keyframes rpulse{0%,100%{box-shadow:0 4px 20px var(--glow)}50%{box-shadow:0 4px 30px rgba(255,107,53,.5)}}
.rt-fab.done{animation:rdone .4s ease infinite alternate}
@keyframes rdone{from{background:linear-gradient(135deg,var(--accent),var(--accent2))}to{background:linear-gradient(135deg,var(--danger),#f97316)}}
.rt-time-fab{font-family:'Kanit';font-weight:800;font-size:.72rem;letter-spacing:-.5px}
.rt-panel{position:fixed;bottom:92px;right:16px;z-index:89;width:260px;background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:20px;box-shadow:0 12px 48px rgba(0,0,0,.5);display:none;animation:si .25s ease}
.rt-panel.show{display:block}
.rt-ring-wrap{display:flex;justify-content:center;margin-bottom:14px}
.rt-ring{position:relative;width:130px;height:130px}
.rt-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.rt-ring .rbg{fill:none;stroke:var(--border);stroke-width:6}
.rt-ring .rfg{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .1s linear}
.rt-ring .rtime{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Kanit';font-weight:900;font-size:1.8rem;color:var(--fg)}
.rt-presets{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.rt-pb{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:0;color:var(--fgd);font-family:'Kanit';font-weight:700;font-size:.78rem;cursor:pointer;transition:.2s}
.rt-pb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.rt-pb:not(.on):hover{border-color:var(--accent);color:var(--accent)}
.rt-custom{display:flex;gap:6px;margin-bottom:12px}
.rt-cinp{flex:1;padding:8px 10px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-family:'Kanit';font-weight:600;font-size:.9rem;outline:none;text-align:center;transition:.2s}
.rt-cinp:focus{border-color:var(--accent)}
.rt-ctrls{display:flex;gap:6px}
.rt-cbtn{flex:1;padding:10px;border:none;border-radius:9px;font-family:'Kanit';font-weight:700;font-size:.85rem;cursor:pointer;transition:.2s}
.rt-start{background:var(--success);color:#fff}.rt-start:hover{filter:brightness(1.15)}
.rt-pause{background:var(--accent2);color:#000}.rt-pause:hover{filter:brightness(1.15)}
.rt-reset{background:var(--card);color:var(--fgd);border:1px solid var(--border)!important}.rt-reset:hover{border-color:var(--danger)!important;color:var(--danger)}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media(max-width:400px){.chart-y{width:40px}.chart-y span{font-size:.52rem}.bar-v{font-size:.58rem}.rt-panel{right:8px;width:240px}}
</style>
</head>
<body>

<div class="bg-fx"><div class="b"></div><div class="b"></div><div class="b"></div></div>

<div class="app">
  <header>
    <h1>WORKOUT PRO</h1>
    <p>แผน ประวัติ และ Progressive Overload</p>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tbtn on" data-t="plan" role="tab" aria-selected="true"><i class="fas fa-calendar-alt"></i> แผน</button>
    <button class="tbtn" data-t="history" role="tab" aria-selected="false"><i class="fas fa-clock-rotate-left"></i> ประวัติ</button>
    <button class="tbtn" data-t="progress" role="tab" aria-selected="false"><i class="fas fa-chart-line"></i> Progress</button>
  </nav>

  <main>
    <section class="tcon on" id="tp-plan" role="tabpanel"></section>
    <section class="tcon" id="tp-history" role="tabpanel"></section>
    <section class="tcon" id="tp-progress" role="tabpanel"></section>
  </main>
</div>

<!-- Rest Timer FAB -->
<button class="rt-fab" id="rtFab" aria-label="ตั้งเวลาพัก"><i class="fas fa-stopwatch"></i></button>
<aside class="rt-panel" id="rtPanel">
  <div class="rt-ring-wrap">
    <div class="rt-ring">

<script>
/* ============================================================

const EXERCISES = [

];

const CATEGORIES = ["ทั้งหมด", ...new Set(EXERCISES.map(e => e.cat))];

/* ============================================================
   สถานะแอป
   ============================================================ */
let currentTab = "plan";
let currentDay = 1;
let selectedCategory = "ทั้งหมด";
let pickedExercise = null;
let modalMode = "plan";   // "plan" หรือ "history"
let modalDay = 1;
let poSelectedExercise = null;
let poView = "weight";

/* ============================================================
   LocalStorage helpers
   ============================================================ */
function loadPlan() {
  try {
    const data = JSON.parse(localStorage.getItem("wp_plan"));
    if (data && typeof data === "object") return data;
  } catch(e) {}
  return { "1": [], "2": [], "3": [], "4": [], "5": [], "6": [], "7": [] };
}

function savePlan(data) {
  localStorage.setItem("wp_plan", JSON.stringify(data));
}

function loadHistory() {
  try {
    const data = JSON.parse(localStorage.getItem("wp_hist"));
    if (Array.isArray(data)) return data;
  } catch(e) {}
  return [];
}

function saveHistory(data) {
  localStorage.setItem("wp_hist", JSON.stringify(data));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

/* ============================================================
   Toast
   ============================================================ */
let toastTimer = null;
function showToast(message, type) {
  type = type || "ok";
  const toastEl = document.getElementById("toast");
  const iconEl = toastEl.querySelector("i");
  document.getElementById("toastMsg").textContent = message;
  toastEl.className = "toast " + type;
  iconEl.className = (type === "ok") ? "fas fa-check-circle" : "fas fa-trash";
  clearTimeout(toastTimer);
  requestAnimationFrame(function() {
    toastEl.classList.add("show");
  });
  toastTimer = setTimeout(function() {
    toastEl.classList.remove("show");
  }, 2200);
}

/* ============================================================
   สลับแท็บ
   ============================================================ */
document.querySelectorAll(".tbtn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".tbtn").forEach(function(b) {
      b.classList.remove("on");
      b.setAttribute("aria-selected", "false");
    });
    document.querySelectorAll(".tcon").forEach(function(c) {
      c.classList.remove("on");
    });
    btn.classList.add("on");
    btn.setAttribute("aria-selected", "true");
    currentTab = btn.getAttribute("data-t");
    document.getElementById("tp-" + currentTab).classList.add("on");
    renderCurrentTab();
  });
});

function renderCurrentTab() {
  if (currentTab === "plan") {
    renderPlan();
  } else if (currentTab === "history") {
    renderHistory();
  } else {
    renderProgress();
  }
}

/* ============================================================
   แท็บแผน
   ============================================================ */
const DAY_COLORS = ["", "var(--d1)", "var(--d2)", "var(--d3)", "var(--d4)", "var(--d5)", "var(--d6)", "var(--d7)"];

function renderPlan() {
  var plan = loadPlan();
  var items = plan[currentDay] || [];
  var color = DAY_COLORS[currentDay];

  // คำนวณสรุป
  var totalSets = 0, totalVol = 0;
  for (var i = 0; i < items.length; i++) {
    var s = parseFloat(items[i].sets) || 0;
    var r = parseFloat(items[i].reps) || 0;
    var w = parseFloat(items[i].weight) || 0;
    totalSets += s;
    totalVol += s * r * w;
  }

  var html = "";

  // แถวเลือกวัน
  html += '<div class="day-sel" id="daySelector">';
  for (var d = 1; d <= 7; d++) {
    var cnt = (plan[d] || []).length;
    var isActive = (d === currentDay) ? " on" : "";
    html += '<button class="dchip' + isActive + '" data-day="' + d + '">วัน ' + d + '<span class="cnt">' + cnt + '</span></button>';
  }
  html += '</div>';

  // สรุป
  if (items.length > 0) {
    html += '<div class="sbar">';
    html += '<div class="sitem"><div class="snum" style="color:' + color + '">' + items.length + '</div><div class="slbl2">ท่า</div></div>';
    html += '<div class="sitem"><div class="snum" style="color:' + color + '">' + totalSets + '</div><div class="slbl2">เซ็ต</div></div>';
    html += '<div class="sitem"><div class="snum" style="color:' + color + '">' + totalVol.toLocaleString() + '</div><div class="slbl2">ปริมาณ kg</div></div>';
    html += '</div>';
  }

  // หัววัน + ล้าง
  html += '<div class="drow">';
  html += '<div class="dtit" style="color:' + color + '">วันที่ ' + currentDay + '</div>';
  if (items.length > 0) {
    html += '<button class="clrbtn" id="clearDayBtn"><i class="fas fa-trash-can"></i> ล้าง</button>';
  }
  html += '</div>';

  // ปุ่มเพิ่ม
  html += '<button class="addbtn" id="addPlanBtn"><i class="fas fa-plus"></i> เพิ่มท่าออกกำลังกาย</button>';

  // รายการ
  if (items.length === 0) {
    html += '<div class="empty"><i class="fas fa-dumbbell"></i><p>ยังไม่มีท่าในวันนี้</p></div>';
  } else {
    html += '<div class="elist">';
    for (var j = 0; j < items.length; j++) {
      html += buildCardHtml(items[j], "plan", null);
    }
    html += '</div>';
  }

  document.getElementById("tp-plan").innerHTML = html;
  bindPlanEvents();
}

function bindPlanEvents() {
  // เลือกวัน
  var dayBtns = document.querySelectorAll("#daySelector .dchip");
  for (var i = 0; i < dayBtns.length; i++) {
    dayBtns[i].addEventListener("click", function() {
      currentDay = parseInt(this.getAttribute("data-day"));
      renderPlan();
    });
  }

  // ปุ่มเพิ่ม
  var addBtn = document.getElementById("addPlanBtn");
  if (addBtn) {
    addBtn.addEventListener("click", function() {
      openModal("plan");
    });
  }

  // ล้างวัน
  var clearBtn = document.getElementById("clearDayBtn");
  if (clearBtn) {
    clearBtn.addEventListener("click", function() {
      var plan = loadPlan();
      plan[currentDay] = [];
      savePlan(plan);
      renderPlan();
      showToast("ล้างวันที่ " + currentDay + " แล้ว", "bad");
    });
  }

  // ผูก event การ์ด (ลบ, ทำซ้ำ, แก้ไข)
  bindAllCardEvents("plan");
}

/* ============================================================
   แท็บประวัติ
   ============================================================ */
function renderHistory() {
  var history = loadHistory();
  var sorted = history.slice().sort(function(a, b) {
    return b.date.localeCompare(a.date);
  });

  // กรุ๊ปตามวันที่
  var grouped = {};
  for (var i = 0; i < sorted.length; i++) {
    var dt = sorted[i].date;
    if (!grouped[dt]) grouped[dt] = [];
    grouped[dt].push(sorted[i]);
  }

  var dates = Object.keys(grouped).sort(function(a, b) { return b.localeCompare(a); });
  var dayNames = ["อา.", "จ.", "อ.", "พ.", "พฤ.", "ศ.", "ส."];

  var html = '';
  html += '<button class="addbtn" id="addHistoryBtn"><i class="fas fa-plus"></i> เพิ่มบันทึกวันนี้</button>';

  if (dates.length === 0) {
    html += '<div class="empty"><i class="fas fa-clock-rotate-left"></i><p>ยังไม่มีประวัติการซ้อม</p></div>';
  } else {
    for (var d = 0; d < dates.length; d++) {
      var date = dates[d];
      var items = grouped[date];
      var dateObj = new Date(date);
      var formatted = dateObj.getDate() + '/' + (dateObj.getMonth() + 1) + '/' + dateObj.getFullYear() + ' (' + dayNames[dateObj.getDay()] + ')';

      var totalVol = 0;
      for (var k = 0; k < items.length; k++) {
        totalVol += (parseFloat(items[k].sets) || 0) * (parseFloat(items[k].reps) || 0) * (parseFloat(items[k].weight) || 0);
      }

      html += '<div class="dhdr"><span>' + formatted + ' — ' + items.length + ' ท่า — ' + totalVol.toLocaleString() + ' kg</span><button class="ddel" data-date="' + date + '"><i class="fas fa-xmark"></i></button></div>';
      html += '<div class="elist" style="margin-bottom:14px">';
      for (var j = 0; j < items.length; j++) {
        html += buildCardHtml(items[j], "history", date);
      }
      html += '</div>';
    }
  }

  document.getElementById("tp-history").innerHTML = html;
  bindHistoryEvents();
}

function bindHistoryEvents() {
  // ปุ่มเพิ่ม
  var addBtn = document.getElementById("addHistoryBtn");
  if (addBtn) {
    addBtn.addEventListener("click", function() {
      openModal("history");
    });
  }

  // ลบทั้งวัน
  var delBtns = document.querySelectorAll(".ddel");
  for (var i = 0; i < delBtns.length; i++) {
    delBtns[i].addEventListener("click", function() {
      var date = this.getAttribute("data-date");
      var history = loadHistory();
      history = history.filter(function(item) { return item.date !== date; });
      saveHistory(history);
      renderHistory();
      showToast("ลบประวัติวันนั้นแล้ว", "bad");
    });
  }

  bindAllCardEvents("history");
}

/* ============================================================
   สร้าง HTML การ์ด
   ============================================================ */
function buildCardHtml(item, mode, date) {
  var dateAttr = date ? ' data-date="' + date + '"' : '';
  return '<div class="ecard" data-id="' + item.id + '" data-mode="' + mode + '"' + dateAttr + '>' +
    '<div class="etop">' +
      '<span class="ename" contenteditable="true" spellcheck="false" data-field="name">' + escapeHtml(item.name) + '</span>' +
      '<button class="sbtn dupb" title="ทำซ้ำ" data-action="dup" data-id="' + item.id + '"><i class="fas fa-copy"></i></button>' +
      '<button class="sbtn delb" title="ลบ" data-action="del" data-id="' + item.id + '"><i class="fas fa-trash"></i></button>' +
    '</div>' +
    '<div class="estats">' +
      '<div class="sbox"><div class="slbl">น้ำหนัก</div><span class="sval" contenteditable="true" spellcheck="false" data-field="weight">' + item.weight + '</span> <span class="sunit">kg</span></div>' +
      '<div class="sbox"><div class="slbl">Reps</div><span class="sval" contenteditable="true" spellcheck="false" data-field="reps">' + item.reps + '</span> <span class="sunit">ครั้ง</span></div>' +
      '<div class="sbox"><div class="slbl">Sets</div><span class="sval" contenteditable="true" spellcheck="false" data-field="sets">' + item.sets + '</span> <span class="sunit">เซ็ต</span></div>' +
    '</div>' +
  '</div>';
}

/* ============================================================
   ผูก event การ์ด (ใช้ delegation)
   ============================================================ */
function bindAllCardEvents(mode) {
  var container = document.getElementById("tp-" + mode);

  // ลบ — ใช้ delegation
  container.addEventListener("click", function(e) {
    var delBtn = e.target.closest('[data-action="del"]');
    if (delBtn) {
      var id = delBtn.getAttribute("data-id");
      var card = delBtn.closest(".ecard");
      card.style.transition = "all 0.3s";
      card.style.opacity = "0";
      card.style.transform = "translateX(50px)";
      setTimeout(function() {
        if (mode === "plan") {
          var plan = loadPlan();
          plan[currentDay] = plan[currentDay].filter(function(x) { return x.id !== id; });
          savePlan(plan);
          renderPlan();
        } else {
          var date = card.getAttribute("data-date");
          var history = loadHistory();
          history = history.filter(function(x) { return !(x.id === id && x.date === date); });
          saveHistory(history);
          renderHistory();
        }
        showToast("ลบแล้ว", "bad");
      }, 280);
      return;
    }

    // ทำซ้ำ
    var dupBtn = e.target.closest('[data-action="dup"]');
    if (dupBtn) {
      var dupId = dupBtn.getAttribute("data-id");
      var dupCard = dupBtn.closest(".ecard");
      if (mode === "plan") {
        var plan = loadPlan();
        var item = plan[currentDay].find(function(x) { return x.id === dupId; });
        if (item) {
          var copy = { id: genId(), name: item.name, cat: item.cat, weight: item.weight, reps: item.reps, sets: item.sets };
          plan[currentDay].push(copy);
          savePlan(plan);
          renderPlan();
          showToast("ทำซ้ำแล้ว");
        }
      } else {
        var dupDate = dupCard.getAttribute("data-date");
        var hist = loadHistory();
        var hItem = hist.find(function(x) { return x.id === dupId && x.date === dupDate; });
        if (hItem) {
          var hCopy = { id: genId(), name: hItem.name, cat: hItem.cat, weight: hItem.weight, reps: hItem.reps, sets: hItem.sets, date: hItem.date };
          hist.push(hCopy);
          saveHistory(hist);
          renderHistory();
          showToast("ทำซ้ำแล้ว");
        }
      }
      return;
    }
  });

  // แก้ไข inline — ใช้ delegation ด้วย
  container.addEventListener("blur", function(e) {
    if (!e.target.classList.contains("sval") && !e.target.classList.contains("ename")) return;

    var card = e.target.closest(".ecard");
    if (!card) return;

    var id = card.getAttribute("data-id");
    var field = e.target.getAttribute("data-field");
    var rawVal = e.target.textContent.trim();
    var val = rawVal;

    if (field !== "name") {
      val = parseFloat(rawVal);
      if (isNaN(val) || val < 0) val = 0;
    }
    if (!val && field === "name") val = "—";

    if (mode === "plan") {
      var plan = loadPlan();
      var item = plan[currentDay].find(function(x) { return x.id === id; });
      if (item) {
        item[field] = val;
        savePlan(plan);
        if (field !== "name") renderPlan();
      }
    } else {
      var date = card.getAttribute("data-date");
      var hist = loadHistory();
      var hItem = hist.find(function(x) { return x.id === id && x.date === date; });
      if (hItem) {
        hItem[field] = val;
        saveHistory(hist);
        if (field !== "name") renderHistory();
      }
    }
  }, true);

  // Enter = ยืนยัน
  container.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && (e.target.classList.contains("sval") || e.target.classList.contains("ename"))) {
      e.preventDefault();
      e.target.blur();
    }
  });
}

/* ============================================================
   โมดัลเพิ่มท่า
   ============================================================ */
function openModal(mode) {
  modalMode = mode;
  pickedExercise = null;
  selectedCategory = "ทั้งหมด";

  document.getElementById("modalForm").classList.remove("show");
  document.getElementById("modalSearch").value = "";

  var dayPickEl = document.getElementById("modalDayPick");
  var datePickEl = document.getElementById("modalDatePick");

  if (mode === "plan") {
    document.getElementById("modalTitle").textContent = "เพิ่มท่า — แผน";
    dayPickEl.style.display = "flex";
    datePickEl.style.display = "none";
    buildModalDayPick();
  } else {
    document.getElementById("modalTitle").textContent = "เพิ่มท่า — ประวัติ";
    dayPickEl.style.display = "none";
    datePickEl.style.display = "block";
    // ค่าเริ่มต้น = วันนี้
    var today = new Date();
    var y = today.getFullYear();
    var m = String(today.getMonth() + 1).padStart(2, "0");
    var d = String(today.getDate()).padStart(2, "0");
    document.getElementById("modalDateInput").value = y + "-" + m + "-" + d;
  }

  buildModalCats();
  buildModalList();
  document.getElementById("modal").classList.add("show");
  setTimeout(function() { document.getElementById("modalSearch").focus(); }, 300);
}

function closeModal() {
  document.getElementById("modal").classList.remove("show");
}

// คลิกพื้นหลังปิด
document.getElementById("modal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

// Escape ปิด
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeModal();
});

/* เลือกวันในโมดัล (แผน) */
function buildModalDayPick() {
  var wrap = document.getElementById("modalDayPick");
  modalDay = currentDay;
  var html = '';
  for (var d = 1; d <= 7; d++) {
    var active = (d === modalDay) ? " on" : "";
    html += '<button class="dpb' + active + '" data-dayval="' + d + '">' + d + '</button>';
  }
  wrap.innerHTML = html;

  wrap.querySelectorAll(".dpb").forEach(function(btn) {
    btn.addEventListener("click", function() {
      modalDay = parseInt(this.getAttribute("data-dayval"));
      wrap.querySelectorAll(".dpb").forEach(function(b) { b.classList.remove("on"); });
      this.classList.add("on");
    });
  });
}

/* หมวดหมู่ในโมดัล */
function buildModalCats() {
  var wrap = document.getElementById("modalCats");
  var html = '';
  for (var i = 0; i < CATEGORIES.length; i++) {
    var active = (CATEGORIES[i] === selectedCategory) ? " on" : "";
    html += '<button class="cc' + active + '">' + CATEGORIES[i] + '</button>';
  }
  wrap.innerHTML = html;

  wrap.querySelectorAll(".cc").forEach(function(btn) {
    btn.addEventListener("click", function() {
      selectedCategory = this.textContent;
      buildModalCats();
      buildModalList();
    });
  });
}

/* รายการท่าในโมดัล */
function buildModalList() {
  var query = document.getElementById("modalSearch").value.toLowerCase().trim();
  var wrap = document.getElementById("modalList");
  var list = EXERCISES.slice();

  if (selectedCategory !== "ทั้งหมด") {
    list = list.filter(function(e) { return e.cat === selectedCategory; });
  }
  if (query) {
    list = list.filter(function(e) {
      return e.name.toLowerCase().indexOf(query) !== -1 || e.cat.indexOf(query) !== -1;
    });
  }

  if (list.length === 0) {
    wrap.innerHTML = '<div class="empty" style="padding:25px 10px"><i class="fas fa-search"></i><p>ไม่พบท่า</p></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < list.length; i++) {
    var ex = list[i];
    html += '<div class="epki" data-exname="' + escapeHtml(ex.name) + '" data-excat="' + escapeHtml(ex.cat) + '">';
    html += '<div><div class="pkn">' + escapeHtml(ex.name) + '</div><div class="pkc">' + escapeHtml(ex.cat) + '</div></div>';
    html += '<div class="pkico"><i class="fas ' + ex.icon + '"></i></div>';
    html += '</div>';
  }
  wrap.innerHTML = html;

  // คลิกเลือกท่า
  wrap.querySelectorAll(".epki").forEach(function(item) {
    item.addEventListener("click", function() {
      pickedExercise = {
        name: this.getAttribute("data-exname"),
        cat: this.getAttribute("data-excat")
      };
      document.getElementById("modalPickedName").textContent = pickedExercise.name;
      document.getElementById("formWeight").value = "";
      document.getElementById("formReps").value = "";
      document.getElementById("formSets").value = "";
      document.getElementById("modalForm").classList.add("show");
      setTimeout(function() { document.getElementById("formWeight").focus(); }, 100);
    });
  });
}

// ค้นหา
document.getElementById("modalSearch").addEventListener("input", function() {
  buildModalList();
});

// กดปุ่มเพิ่ม
document.getElementById("formSubmit").addEventListener("click", function() {
  if (!pickedExercise) return;

  var weight = parseFloat(document.getElementById("formWeight").value) || 0;
  var reps = parseFloat(document.getElementById("formReps").value) || 0;
  var sets = parseFloat(document.getElementById("formSets").value) || 0;

  var entry = {
    id: genId(),
    name: pickedExercise.name,
    cat: pickedExercise.cat,
    weight: weight,
    reps: reps,
    sets: sets
  };

  if (modalMode === "plan") {
    var plan = loadPlan();
    if (!plan[modalDay]) plan[modalDay] = [];
    plan[modalDay].push(entry);
    savePlan(plan);
    currentDay = modalDay;
    renderPlan();
  } else {
    var date = document.getElementById("modalDateInput").value;
    if (!date) {
      showToast("กรุณาเลือกวันที่", "bad");
      return;
    }
    entry.date = date;
    var history = loadHistory();
    history.push(entry);
    saveHistory(history);
    renderHistory();
  }

  showToast("เพิ่ม " + pickedExercise.name + " แล้ว");
  closeModal();
});

/* ============================================================
   Progressive Overload
   ============================================================ */
function renderProgress() {
  var history = loadHistory();

  // ดึงท่าที่มีในประวัติ
  var excMap = {};
  for (var i = 0; i < history.length; i++) {
    var name = history[i].name;
    if (!excMap[name]) excMap[name] = 0;
    excMap[name]++;
  }
  var excNames = Object.keys(excMap).sort();

  var html = '';

  if (excNames.length === 0) {
    html += '<div class="empty"><i class="fas fa-chart-line"></i><p>ยังไม่มีข้อมูล — เพิ่มประวัติการซ้อมก่อน</p></div>';
    document.getElementById("tp-progress").innerHTML = html;
    return;
  }

  // ถ้ายังไม่เลือกท่า ให้เลือกท่าแรก
  if (!poSelectedExercise || excNames.indexOf(poSelectedExercise) === -1) {
    poSelectedExercise = excNames[0];
  }

  // เลือกท่า
  html += '<div class="po-exc" id="poExcList">';
  for (var j = 0; j < excNames.length; j++) {
    var n = excNames[j];
    var active = (n === poSelectedExercise) ? " on" : "";
    html += '<button class="po-chip' + active + '" data-pname="' + escapeHtml(n) + '">' + escapeHtml(n) + '<span class="poc">' + excMap[n] + '</span></button>';
  }
  html += '</div>';

  // สลับ view
  html += '<div class="po-toggle" id="poToggle">';
  html += '<button class="po-tbtn' + (poView === "weight" ? " on" : "") + '" data-pview="weight">น้ำหนัก</button>';
  html += '<button class="po-tbtn' + (poView === "volume" ? " on" : "") + '" data-pview="volume">ปริมาณ</button>';
  html += '</div>';

  // กราฟ + สถิติ
  if (poSelectedExercise) {
    var chartData = getPOData(poSelectedExercise);
    html += buildChartHtml(chartData);
    html += buildPOStatsHtml(chartData);
  }

  document.getElementById("tp-progress").innerHTML = html;
  bindProgressEvents();
}

function getPOData(name) {
  var history = loadHistory().filter(function(x) { return x.name === name; });
  var grouped = {};
  for (var i = 0; i < history.length; i++) {
    var item = history[i];
    if (!grouped[item.date]) grouped[item.date] = { maxWeight: 0, totalVolume: 0 };
    grouped[item.date].maxWeight = Math.max(grouped[item.date].maxWeight, parseFloat(item.weight) || 0);
    grouped[item.date].totalVolume += (parseFloat(item.sets) || 0) * (parseFloat(item.reps) || 0) * (parseFloat(item.weight) || 0);
  }
  var result = [];
  var keys = Object.keys(grouped).sort();
  for (var k = 0; k < keys.length; k++) {
    result.push({ date: keys[k], maxWeight: grouped[keys[k]].maxWeight, totalVolume: grouped[keys[k]].totalVolume });
  }
  return result;
}

function buildChartHtml(data) {
  if (data.length === 0) return '<div class="empty"><i class="fas fa-chart-bar"></i><p>ไม่มีข้อมูล</p></div>';

  var isWeight = (poView === "weight");
  var vals = [];
  for (var i = 0; i < data.length; i++) {
    vals.push(isWeight ? data[i].maxWeight : data[i].totalVolume);
  }
  var maxVal = Math.max.apply(null, vals);
  if (maxVal <= 0) maxVal = 1;

  // Y-axis labels
  var yLabels = [];
  for (var y = 4; y >= 0; y--) {
    yLabels.push(Math.round(maxVal * y / 4));
  }

  var dayNames = ["อา.", "จ.", "อ.", "พ.", "พฤ.", "ศ.", "ส."];

  var html = '<div class="chart-wrap"><div class="chart-area">';

  // Y axis
  html += '<div class="chart-y">';
  for (var y2 = 0; y2 < yLabels.length; y2++) {
    html += '<span>' + (isWeight ? yLabels[y2] + 'kg' : yLabels[y2].toLocaleString()) + '</span>';
  }
  html += '</div>';

  // Chart body
  html += '<div class="chart-body">';
  html += '<div class="chart-grid">';
  for (var g = 1; g <= 4; g++) {
    html += '<div class="gl" style="bottom:' + (g * 25) + '%"></div>';
  }
  html += '</div>';

  // Bars
  html += '<div class="chart-bars">';
  var bestIdx = vals.indexOf(maxVal);
  for (var b = 0; b < data.length; b++) {
    var v = vals[b];
    var pct = Math.max((v / maxVal) * 100, 1);
    var isBest = (b === bestIdx && data.length > 1);

    // % change badge
    var pctHtml = '';
    if (b > 0) {
      var prev = vals[b - 1];
      if (prev > 0) {
        var change = ((v - prev) / prev * 100).toFixed(1);
        if (change > 0) pctHtml = '<div class="pct-badge up"><i class="fas fa-arrow-up" style="font-size:.45rem"></i> +' + change + '%</div>';
        else if (change < 0) pctHtml = '<div class="pct-badge dn"><i class="fas fa-arrow-down" style="font-size:.45rem"></i> ' + change + '%</div>';
        else pctHtml = '<div class="pct-badge eq">0%</div>';
      }
    }

    var valText = isWeight ? v + 'kg' : v.toLocaleString();
    html += '<div class="bar-col">';
    html += pctHtml;
    html += '<div class="bar-v">' + valText + '</div>';
    html += '<div class="cbar' + (isBest ? ' best' : '') + '" style="height:' + pct + '%"></div>';
    html += '</div>';
  }
  html += '</div>';

  // X axis labels
  html += '<div class="chart-xl">';
  for (var x = 0; x < data.length; x++) {
    var dt = new Date(data[x].date);
    var label = dt.getDate() + '/' + (dt.getMonth() + 1) + ' ' + dayNames[dt.getDay()];
    html += '<div class="xl">' + label + '</div>';
  }
  html += '</div>';

  html += '</div></div></div>';
  return html;
}

function buildPOStatsHtml(data) {
  if (data.length < 2) return '';
  var isWeight = (poView === "weight");
  var vals = [];
  for (var i = 0; i < data.length; i++) {
    vals.push(isWeight ? data[i].maxWeight : data[i].totalVolume);
  }
  var first = vals[0];
  var last = vals[vals.length - 1];
  var best = Math.max.apply(null, vals);
  var worst = Math.min.apply(null, vals);
  var totalChange = (first > 0) ? ((last - first) / first * 100).toFixed(1) : "0";
  var isUp = parseFloat(totalChange) > 0;
  var isDn = parseFloat(totalChange) < 0;
  var changeClass = isUp ? " up" : (isDn ? " dn" : "");
  var changeText = (parseFloat(totalChange) > 0 ? "+" : "") + totalChange + "%";

  var unit = isWeight ? "kg" : "kg";

  var html = '<div class="po-stats">';
  html += '<div class="po-si"><div class="po-sv">' + best + unit + '</div><div class="po-sl">สูงสุด</div></div>';
  html += '<div class="po-si"><div class="po-sv">' + worst + unit + '</div><div class="po-sl">ต่ำสุด</div></div>';
  html += '<div class="po-si"><div class="po-sv' + changeClass + '">' + changeText + '</div><div class="po-sl">เปลี่ยนจากครั้งแรก</div></div>';
  html += '<div class="po-si"><div class="po-sv">' + data.length + '</div><div class="po-sl">เซสชัน</div></div>';
  html += '</div>';
  return html;
}

function bindProgressEvents() {
  var excList = document.getElementById("poExcList");
  if (excList) {
    excList.querySelectorAll(".po-chip").forEach(function(btn) {
      btn.addEventListener("click", function() {
        poSelectedExercise = this.getAttribute("data-pname");
        renderProgress();
      });
    });
  }

  var toggle = document.getElementById("poToggle");
  if (toggle) {
    toggle.querySelectorAll(".po-tbtn").forEach(function(btn) {
      btn.addEventListener("click", function() {
        poView = this.getAttribute("data-pview");
        renderProgress();
      });
    });
  }
}

/* ============================================================
   Rest Timer
   ============================================================ */
var CIRCUMFERENCE = 2 * Math.PI * 56; // ~351.86
var rtDuration = 60;
var rtStartTime = null;
var rtIsRunning = false;
var rtIsPaused = false;
var rtPausedRemain = 0;
var rtInterval = null;
var rtPanelOpen = false;

function rtUpdateDisplay() {
  var remain;
  if (rtIsPaused) {
    remain = rtPausedRemain;
  } else if (rtIsRunning) {
    remain = Math.max(0, rtDuration - (Date.now() - rtStartTime) / 1000);
  } else {
    remain = rtDuration;
  }

  var minutes = Math.floor(remain / 60);
  var seconds = Math.floor(remain % 60);
  var timeStr = minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

  document.getElementById("rtDisplay").textContent = timeStr;

  var progress = (rtDuration > 0) ? remain / rtDuration : 1;
  document.getElementById("rtRing").style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);

  // อัปเดต FAB
  var fab = document.getElementById("rtFab");
  if (rtIsRunning || rtIsPaused) {
    fab.innerHTML = '<span class="rt-time-fab">' + timeStr + '</span>';
    fab.classList.add("pulse");
    fab.classList.remove("done");
  }
  if (remain <= 0 && rtIsRunning) {
    rtFinish();
  }
}

function rtStartTimer() {
  if (rtIsRunning) return;
  if (rtIsPaused) {
    rtStartTime = Date.now() - (rtDuration - rtPausedRemain) * 1000;
    rtIsPaused = false;
  } else {
    rtStartTime = Date.now();
    if (rtDuration <= 0) rtDuration = 60;
  }
  rtIsRunning = true;

  var btn = document.getElementById("rtStartBtn");
  btn.innerHTML = '<i class="fas fa-pause"></i> หยุด';
  btn.className = "rt-cbtn rt-pause";

  rtInterval = setInterval(rtUpdateDisplay, 50);
}

function rtPauseTimer() {
  if (!rtIsRunning) return;
  rtIsPaused = true;
  rtIsRunning = false;
  rtPausedRemain = Math.max(0, rtDuration - (Date.now() - rtStartTime) / 1000);
  clearInterval(rtInterval);

  var btn = document.getElementById("rtStartBtn");
  btn.innerHTML = '<i class="fas fa-play"></i> ต่อ';
  btn.className = "rt-cbtn rt-start";
}

function rtResetTimer() {
  rtIsRunning = false;
  rtIsPaused = false;
  rtPausedRemain = 0;
  clearInterval(rtInterval);

  var btn = document.getElementById("rtStartBtn");
  btn.innerHTML = '<i class="fas fa-play"></i> เริ่ม';
  btn.className = "rt-cbtn rt-start";

  var fab = document.getElementById("rtFab");
  fab.innerHTML = '<i class="fas fa-stopwatch"></i>';
  fab.classList.remove("pulse", "done");

  rtUpdateDisplay();
}

function rtFinish() {
  rtIsRunning = false;
  clearInterval(rtInterval);

  var btn = document.getElementById("rtStartBtn");
  btn.innerHTML = '<i class="fas fa-play"></i> เริ่ม';
  btn.className = "rt-cbtn rt-start";

  var fab = document.getElementById("rtFab");
  fab.innerHTML = '<i class="fas fa-stopwatch"></i>';
  fab.classList.remove("pulse");
  fab.classList.add("done");
  setTimeout(function() { fab.classList.remove("done"); }, 3000);

  rtBeep();
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
}

function rtBeep() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var delays = [0, 0.22, 0.44];
    for (var i = 0; i < delays.length; i++) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = "sine";
      gain.gain.setValueAtTime(0.25, ctx.currentTime + delays[i]);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delays[i] + 0.18);
      osc.start(ctx.currentTime + delays[i]);
      osc.stop(ctx.currentTime + delays[i] + 0.18);
    }
  } catch(e) {}
}

function rtSetDuration(seconds) {
  rtDuration = seconds;
  rtResetTimer();
}

// FAB toggle
document.getElementById("rtFab").addEventListener("click", function(e) {
  e.stopPropagation();
  rtPanelOpen = !rtPanelOpen;
  document.getElementById("rtPanel").classList.toggle("show", rtPanelOpen);
});

// คลิกข้างนอกปิด panel
document.addEventListener("click", function(e) {
  if (rtPanelOpen && !e.target.closest("#rtPanel") && !e.target.closest("#rtFab")) {
    rtPanelOpen = false;
    document.getElementById("rtPanel").classList.remove("show");
  }
});

// ปุ่มเริ่ม/หยุด
document.getElementById("rtStartBtn").addEventListener("click", function() {
  if (rtIsRunning) rtPauseTimer();
  else rtStartTimer();
});

// ปุ่มรีเซ็ต
document.getElementById("rtResetBtn").addEventListener("click", rtResetTimer);

// Presets
document.querySelectorAll("#rtPresets .rt-pb").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll("#rtPresets .rt-pb").forEach(function(b) { b.classList.remove("on"); });
    this.classList.add("on");
    rtSetDuration(parseInt(this.getAttribute("data-s")));
  });
});

// Custom
document.getElementById("rtSetCustom").addEventListener("click", function() {
  var val = parseInt(document.getElementById("rtCustom").value);
  if (val > 0) {
    document.querySelectorAll("#rtPresets .rt-pb").forEach(function(b) { b.classList.remove("on"); });
    rtSetDuration(val);
    document.getElementById("rtCustom").value = "";
  }
});
document.getElementById("rtCustom").addEventListener("keydown", function(e) {
  if (e.key === "Enter") document.getElementById("rtSetCustom").click();
});

/* ============================================================
   เริ่มต้น
   ============================================================ */
renderCurrentTab();
rtUpdateDisplay();
</script>
