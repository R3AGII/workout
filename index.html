<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORKOUT PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;600;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #08080e;
  --bg2: #0e0e18;
  --bg3: #141422;
  --glass: rgba(255,255,255,0.03);
  --glass2: rgba(255,255,255,0.06);
  --glass3: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --fg: #f0f0f5;
  --fg2: #c0c0d0;
  --fg3: #707088;
  --accent: #e8a045;
  --accent2: #f0c060;
  --accent3: #d08030;
  --glow: rgba(232,160,69,0.2);
  --glow2: rgba(232,160,69,0.08);
  --red: #f05050;
  --green: #40d880;
  --blue: #50a0f0;
  --purple: #a070f0;
  --d1: #e8a045;
  --d2: #f0c060;
  --d3: #40d880;
  --d4: #50a0f0;
  --d5: #a070f0;
  --d6: #f06090;
  --d7: #40c8c0;
  --radius: 16px;
  --radius2: 12px;
  --radius3: 10px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

::-webkit-scrollbar {
  width: 4px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
}

body {
  font-family: 'Space Grotesk', 'Kanit', sans-serif;
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

.bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.bg .orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.08;
}

.bg .orb:nth-child(1) {
  width: 600px;
  height: 600px;
  background: var(--accent);
  top: -200px;
  left: -150px;
  animation: orbFloat 20s ease-in-out infinite alternate;
}

.bg .orb:nth-child(2) {
  width: 500px;
  height: 500px;
  background: var(--purple);
  bottom: -200px;
  right: -150px;
  animation: orbFloat 18s ease-in-out infinite alternate-reverse;
}

.bg .orb:nth-child(3) {
  width: 350px;
  height: 350px;
  background: var(--blue);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: orbFloat 22s ease-in-out infinite alternate;
}

@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(30px, -20px) scale(1.1); }
  100% { transform: translate(-20px, 30px) scale(0.95); }
}

.bg .grain {
  position: absolute;
  inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.app {
  position: relative;
  z-index: 1;
  max-width: 520px;
  margin: 0 auto;
  padding: 16px 16px 140px;
}

.hdr {
  text-align: center;
  padding: 32px 0 8px;
  position: relative;
}

.hdr h1 {
  font-family: 'Kanit';
  font-weight: 900;
  font-size: 1.6rem;
  letter-spacing: 4px;
  background: linear-gradient(135deg, var(--accent), var(--accent2), #fff, var(--accent));
  background-size: 200% auto;
  animation: shineText 4s linear infinite;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

@keyframes shineText {
  to { background-position: 200% center; }
}

.hdr .sub {
  color: var(--fg3);
  font-size: 0.7rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 6px;
  font-weight: 300;
}

.hdr .line {
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  margin: 12px auto 0;
  border-radius: 2px;
}

.tabs {
  display: flex;
  gap: 2px;
  background: var(--bg2);
  border-radius: var(--radius);
  padding: 3px;
  margin: 24px 0 20px;
  border: 1px solid var(--border);
  position: relative;
}

.tabs::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: var(--radius);
  padding: 1px;
  background: linear-gradient(135deg, var(--accent), transparent, var(--purple));
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  opacity: 0.3;
}

.tbtn {
  flex: 1;
  padding: 11px 4px;
  border: none;
  background: 0;
  color: var(--fg3);
  font-family: 'Kanit';
  font-weight: 600;
  font-size: 0.78rem;
  border-radius: var(--radius2);
  cursor: pointer;
  transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  position: relative;
  letter-spacing: 0.5px;
}

.tbtn.on {
  background: linear-gradient(135deg, var(--accent3), var(--accent));
  color: #fff;
  box-shadow: 0 4px 24px var(--glow), inset 0 1px 0 rgba(255,255,255,0.15);
}

.tbtn:not(.on):hover {
  color: var(--fg2);
  background: var(--glass2);
}

.tcon {
  display: none;
}

.tcon.on {
  display: block;
  animation: fadeUp 0.35s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.day-sel {
  display: flex;
  gap: 6px;
  margin-bottom: 18px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}

.day-sel::-webkit-scrollbar {
  display: none;
}

.dchip {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: var(--radius3);
  border: 1px solid var(--border);
  background: var(--glass);
  color: var(--fg3);
  font-family: 'Kanit';
  font-weight: 600;
  font-size: 0.8rem;
  cursor: pointer;
  transition: 0.3s;
  display: flex;
  align-items: center;
  gap: 6px;
  position: relative;
  overflow: hidden;
}

.dchip::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: 0.3s;
}

.dchip .cnt {
  background: var(--glass2);
  padding: 1px 7px;
  border-radius: 6px;
  font-size: 0.68rem;
  font-family: 'Space Grotesk';
}

.dchip.on {
  color: #fff;
  border-color: transparent;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.dchip.on::before {
  opacity: 1;
}

.dchip[data-d="1"].on { background: var(--d1); }
.dchip[data-d="1"]::before { background: linear-gradient(135deg, var(--d1), #c06020); }
.dchip[data-d="2"].on { background: var(--d2); }
.dchip[data-d="2"]::before { background: linear-gradient(135deg, var(--d2), #c09030); }
.dchip[data-d="3"].on { background: var(--d3); }
.dchip[data-d="3"]::before { background: linear-gradient(135deg, var(--d3), #20a060); }
.dchip[data-d="4"].on { background: var(--d4); }
.dchip[data-d="4"]::before { background: linear-gradient(135deg, var(--d4), #2070c0); }
.dchip[data-d="5"].on { background: var(--d5); }
.dchip[data-d="5"]::before { background: linear-gradient(135deg, var(--d5), #7050c0); }
.dchip[data-d="6"].on { background: var(--d6); }
.dchip[data-d="6"]::before { background: linear-gradient(135deg, var(--d6), #c04070); }
.dchip[data-d="7"].on { background: var(--d7); }
.dchip[data-d="7"]::before { background: linear-gradient(135deg, var(--d7), #209090); }

.addbtn {
  width: 100%;
  padding: 14px;
  border: 1px dashed var(--border2);
  border-radius: var(--radius);
  background: var(--glass);
  color: var(--fg3);
  font-family: 'Kanit';
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: 0.4s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}

.addbtn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--glow2), transparent);
  opacity: 0;
  transition: 0.4s;
}

.addbtn:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px var(--glow2);
}

.addbtn:hover::after {
  opacity: 1;
}

.elist {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.ecard {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  animation: cardIn 0.4s ease;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.ecard::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass3), transparent);
}

.ecard:hover {
  border-color: var(--border2);
  background: var(--glass2);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.etop {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.ename {
  font-family: 'Kanit';
  font-weight: 800;
  font-size: 0.95rem;
  color: var(--fg);
  flex: 1;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--radius3);
  border: 1px solid transparent;
  transition: 0.3s;
  outline: none;
  min-width: 0;
  word-break: break-word;
}

.ename:hover { background: var(--glass2); }

.ename:focus {
  background: var(--bg3);
  border-color: var(--accent);
  cursor: text;
  box-shadow: 0 0 0 3px var(--glow2);
}

.ibtn {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  transition: 0.3s;
  flex-shrink: 0;
  margin-left: 6px;
  background: var(--glass);
}

.ibtn.del { color: var(--red); }

.ibtn.del:hover {
  background: var(--red);
  color: #fff;
  border-color: var(--red);
  transform: scale(1.1);
  box-shadow: 0 0 16px rgba(240,80,80,0.3);
}

.ibtn.dup { color: var(--green); }

.ibtn.dup:hover {
  background: var(--green);
  color: #000;
  border-color: var(--green);
  transform: scale(1.1);
  box-shadow: 0 0 16px rgba(64,216,128,0.3);
}

.estats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.sbox {
  background: var(--bg2);
  border-radius: var(--radius3);
  padding: 10px 8px;
  text-align: center;
  border: 1px solid var(--border);
  transition: 0.3s;
}

.sbox:hover { border-color: var(--border2); }

.slbl {
  font-size: 0.55rem;
  color: var(--fg3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 4px;
  font-weight: 500;
}

.sval {
  font-family: 'Kanit';
  font-weight: 800;
  font-size: 1.05rem;
  color: var(--fg);
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 6px;
  border: 1px solid transparent;
  outline: none;
  transition: 0.3s;
  display: inline-block;
}

.sval:hover { background: var(--glass2); }

.sval:focus {
  background: var(--bg);
  border-color: var(--accent);
  cursor: text;
  box-shadow: 0 0 0 3px var(--glow2);
}

.sunit {
  font-size: 0.6rem;
  color: var(--fg3);
  font-weight: 300;
}

.sbar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.sitem {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 14px 10px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.sitem::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 20%;
  right: 20%;
  height: 1px;
  border-radius: 1px;
}

.snum {
  font-family: 'Kanit';
  font-weight: 900;
  font-size: 1.3rem;
}

.slbl2 {
  font-size: 0.55rem;
  color: var(--fg3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 3px;
  font-weight: 500;
}

.dhdr {
  font-family: 'Kanit';
  font-weight: 600;
  font-size: 0.78rem;
  color: var(--fg3);
  padding: 8px 4px 6px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.dhdr::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

.ddel {
  background: 0;
  border: 1px solid var(--border);
  color: var(--fg3);
  cursor: pointer;
  font-size: 0.68rem;
  padding: 3px 8px;
  border-radius: 6px;
  transition: 0.3s;
  font-family: 'Space Grotesk';
}

.ddel:hover {
  border-color: var(--red);
  color: var(--red);
  background: rgba(240,80,80,0.08);
}

.drow {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.dtit {
  font-family: 'Kanit';
  font-weight: 800;
  font-size: 1rem;
  letter-spacing: 0.5px;
}

.clrbtn {
  padding: 5px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--glass);
  color: var(--fg3);
  font-family: 'Space Grotesk';
  font-size: 0.7rem;
  cursor: pointer;
  transition: 0.3s;
  display: flex;
  align-items: center;
  gap: 5px;
  font-weight: 500;
}

.clrbtn:hover {
  border-color: var(--red);
  color: var(--red);
  background: rgba(240,80,80,0.06);
}

.empty {
  text-align: center;
  padding: 50px 20px;
  color: var(--fg3);
}

.empty i {
  font-size: 2.5rem;
  margin-bottom: 14px;
  opacity: 0.15;
  display: block;
}

.empty p {
  font-size: 0.82rem;
  font-weight: 300;
  letter-spacing: 0.5px;
}

.mo {
  position: fixed;
  inset: 0;
  background: rgba(4,4,8,0.85);
  backdrop-filter: blur(12px);
  z-index: 100;
  display: none;
  align-items: flex-end;
  justify-content: center;
}

.mo.show {
  display: flex;
  animation: modalFade 0.2s ease;
}

@keyframes modalFade {
  from { opacity: 0; }
  to { opacity: 1; }
}

.md {
  background: var(--bg2);
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 520px;
  max-height: 88vh;
  overflow-y: auto;
  padding: 20px 18px 40px;
  animation: modalSlide 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  border: 1px solid var(--border);
  border-bottom: none;
  position: relative;
}

.md::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--purple), transparent);
  opacity: 0.4;
}

@keyframes modalSlide {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.mh {
  width: 36px;
  height: 4px;
  background: var(--glass3);
  border-radius: 4px;
  margin: 0 auto 18px;
}

.mt {
  font-family: 'Kanit';
  font-weight: 800;
  font-size: 1.15rem;
  margin-bottom: 18px;
  letter-spacing: 0.5px;
}

.sbox2 {
  position: relative;
  margin-bottom: 14px;
}

.sbox2 > i {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--fg3);
  font-size: 0.85rem;
}

.sinp {
  width: 100%;
  padding: 13px 14px 13px 42px;
  border-radius: var(--radius2);
  border: 1px solid var(--border);
  background: var(--glass);
  color: var(--fg);
  font-family: 'Space Grotesk';
  font-size: 0.9rem;
  outline: none;
  transition: 0.3s;
}

.sinp:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--glow2);
}

.cchips {
  display: flex;
  gap: 5px;
  overflow-x: auto;
  padding-bottom: 6px;
  margin-bottom: 12px;
  scrollbar-width: none;
}

.cchips::-webkit-scrollbar { display: none; }

.cc {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--glass);
  color: var(--fg3);
  font-family: 'Space Grotesk';
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: 0.3s;
  white-space: nowrap;
}

.cc.on {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  font-weight: 600;
  box-shadow: 0 2px 12px var(--glow);
}

.cc:not(.on):hover {
  border-color: var(--accent);
  color: var(--accent);
}

.epkl {
  display: flex;
  flex-direction: column;
  gap: 3px;
  max-height: 35vh;
  overflow-y: auto;
  padding-right: 4px;
}

.epki {
  padding: 11px 14px;
  border-radius: var(--radius3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: 0.3s;
  border: 1px solid transparent;
}

.epki:hover {
  background: var(--glass2);
  border-color: var(--border);
}

.epki:active { transform: scale(0.98); }

.pkn { font-weight: 600; font-size: 0.88rem; }
.pkc { font-size: 0.65rem; color: var(--fg3); margin-top: 2px; font-weight: 300; }

.pkico {
  width: 34px;
  height: 34px;
  border-radius: var(--radius3);
  background: linear-gradient(135deg, var(--glow2), var(--glass2));
  border: 1px solid var(--border);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  flex-shrink: 0;
}

.dform {
  display: none;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.dform.show {
  display: block;
  animation: fadeUp 0.3s ease;
}

.frow {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

.fg { margin-bottom: 16px; }

.fl {
  display: block;
  font-size: 0.65rem;
  color: var(--fg3);
  margin-bottom: 6px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.finp {
  width: 100%;
  padding: 12px;
  border-radius: var(--radius3);
  border: 1px solid var(--border);
  background: var(--glass);
  color: var(--fg);
  font-family: 'Kanit';
  font-weight: 700;
  font-size: 1rem;
  outline: none;
  transition: 0.3s;
  text-align: center;
}

.finp:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--glow2);
}

.finp::placeholder {
  color: var(--fg3);
  font-weight: 300;
  font-size: 0.8rem;
}

.sbtn2 {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: var(--radius2);
  background: linear-gradient(135deg, var(--accent3), var(--accent), var(--accent2));
  color: #000;
  font-family: 'Kanit';
  font-weight: 800;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.4s;
  box-shadow: 0 4px 24px var(--glow);
  position: relative;
  overflow: hidden;
  letter-spacing: 0.5px;
}

.sbtn2::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: translateX(-100%);
  transition: 0.6s;
}

.sbtn2:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px var(--glow);
}

.rt-pb.on {

  var t = document.getElementById("toast");
  var icon = t.querySelector("i");
  document.getElementById("toastMsg").textContent = msg;
  t.className = "toast " + (isOk ? "ok show" : "bad show");
  icon.className = "fa-solid " + (isOk ? "fa-circle-check" : "fa-circle-xmark");
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(function () { t.classList.remove("show"); }, 2400);
}

function attachInlineEditListeners(container, mode) {
  container.addEventListener("keydown", function (e) {
    if (e.target.classList.contains("ename") || e.target.classList.contains("sval")) {
      if (e.key === "Enter") {
        e.preventDefault();
        e.target.blur();
      }
    }
  });

  container.addEventListener("blur", function (e) {
    var target = e.target;
    if (target.classList.contains("ename") || target.classList.contains("sval")) {
      var card = target.closest(".ecard");
      var idx = parseInt(card.getAttribute("data-idx"));
      var field = target.getAttribute("data-f");
      var rawVal = target.textContent.trim();

      var list = mode === "plan" ? planData[state.currentDay] : logData[state.currentLogDate];
      if (!list || !list[idx]) return;

      var item = list[idx];
      var val = rawVal;

      if (field !== "name") {
        val = parseFloat(rawVal);
        // ปรับปรุงจุดที่ 3: หากติดลบหรือมิใช่ตัวเลข จะล็อกกลับเป็น 0 และซิงค์เปลี่ยนตัวหนังสือบนหน้าจอทันทีเพื่อลดความสับสน
        if (isNaN(val) || val < 0) val = 0;
      }
      if (!val && field === "name") val = "—";

      // ซิงค์อัปเดตหน้า UI ทันที
      target.textContent = val;
      item[field] = val;
      saveAll();
    }
  }, true);
}

// PROGRESSIVE OVERLOAD ANALYTICS (TAB PO)
// ==========================================
function getAllTrackedExercises() {
  var exMap = {};
  Object.keys(logData).forEach(function (dt) {
    var items = logData[dt] || [];
    items.forEach(function (it) {
      if (it.name) exMap[it.name] = (exMap[it.name] || 0) + 1;
    });
  });
  return Object.keys(exMap).sort();
}

function getExerciseHistory(exName) {
  var history = [];
  Object.keys(logData).sort().forEach(function (dt) {
    var items = logData[dt] || [];
    var matched = items.filter(function (it) { return it.name === exName; });
    if (matched.length > 0) {
      var totalVolume = 0;
      var highestEst1RM = 0;
      matched.forEach(function (it) {
        var w = parseFloat(it.weight) || 0;
        var r = parseInt(it.reps) || 0;
        var s = parseInt(it.sets) || 0;
        totalVolume += w * r * s;
        var est1RM = w * (1 + r / 30);
        if (est1RM > highestEst1RM) highestEst1RM = est1RM;
      });
      history.push({ date: dt, totalVolume: totalVolume, max1RM: highestEst1RM });
    }
  });
  return history;
}

function renderPoTab() {
  var exercises = getAllTrackedExercises();
  var chipWrap = document.getElementById("poExcSel");

  if (exercises.length === 0) {
    chipWrap.innerHTML = "";
    document.getElementById("poContent").innerHTML = '<div class="empty"><i class="fa-solid fa-chart-pie" style="opacity:0.15;"></i><p>ยังไม่มีสถิติสำหรับประมวลผลข้อมูล<br>กรุณากรอกข้อมูลที่แท็บ "บันทึกยก" เพื่อเริ่มระบบ</p></div>';
    return;
  }

  if (!state.poSelectedExercise || exercises.indexOf(state.poSelectedExercise) === -1) {
    state.poSelectedExercise = exercises[0];
  }

  var html = "";
  exercises.forEach(function (ex) {
    var on = ex === state.poSelectedExercise ? "on" : "";
    var hist = getExerciseHistory(ex);
    html += '<button class="po-chip ' + on + '" data-ex="' + ex + '">' + ex + ' <span class="poc">' + hist.length + '</span></button>';
  });
  chipWrap.innerHTML = html;

  chipWrap.querySelectorAll(".po-chip").forEach(function (btn) {
    btn.addEventListener("click", function () {
      state.poSelectedExercise = this.getAttribute("data-ex");
      renderPoTab();
    });
  });

  var data = getExerciseHistory(state.poSelectedExercise);
  // ตัดประวัติให้เหลือ 5 จุดหลังสุดเพื่อความสวยงามของหน้าจอกราฟ
  if (data.length > 5) data = data.slice(-5);

  var vOn = state.poMetric === "volume" ? "on" : "";
  var mOn = state.poMetric === "max" ? "on" : "";

  var contentHtml = `
    <div class="po-toggle">
      <button class="po-tbtn ${vOn}" data-m="volume">ปริมาณ (Volume)</button>
      <button class="po-tbtn ${mOn}" data-m="max">ความแข็งแกร่ง (Est. 1RM)</button>
    </div>`;

  contentHtml += buildPOChartsHtml(data);
  contentHtml += buildPOStatsHtml(data);

  document.getElementById("poContent").innerHTML = contentHtml;

  document.querySelectorAll(".po-toggle .po-tbtn").forEach(function (btn) {
    btn.addEventListener("click", function () {
      state.poMetric = this.getAttribute("data-m");
      renderPoTab();
    });
  });
}

function buildPOChartsHtml(data) {
  // ปรับปรุงจุดที่ 2: จัดการกับโครงสร้างข้อมูลเพื่อป้องกันข้อผิดพลาดกรณีเป็นข้อมูลว่างเปล่า (NaN/Empty values)
  if (data.length === 0) {
    return `
      <div class="chart-wrap">
        <div class="chart-area"><div class="empty" style="margin:auto;"><p>ยังไม่มีจุดข้อมูลเพียงพอสำหรับสร้างรายงาน</p></div></div>
      </div>`;
  }

  var vals = data.map(function (d) { return state.poMetric === "volume" ? d.totalVolume : d.max1RM; });
  var maxVal = Math.max.apply(null, vals);
  if (maxVal <= 0) maxVal = 1;

  var gridLines = "";
  for (var i = 0; i <= 4; i++) {
    var topPct = (i * 25);
    gridLines += `<div class="gl" style="top:${topPct}%"></div>`;
  }

  var yLabels = "";
  for (var i = 4; i >= 0; i--) {
    var v = (maxVal * (i / 4));
    yLabels += `<span>${v >= 1000 ? (v / 1000).toFixed(1) + "k" : v.toFixed(0)}</span>`;
  }

  var barHtml = "";
  var xHtml = "";

  data.forEach(function (d, idx) {
    var currentVal = state.poMetric === "volume" ? d.totalVolume : d.max1RM;
    var hPct = (currentVal / maxVal) * 100;
    if (hPct < 3) hPct = 3;

    var badgeHtml = "";
    if (idx > 0) {
      var prevVal = state.poMetric === "volume" ? data[idx - 1].totalVolume : data[idx - 1].max1RM;
      if (prevVal > 0) {
        var diff = ((currentVal - prevVal) / prevVal) * 100;
        if (diff > 0.1) badgeHtml = `<span class="pct-badge up">+${diff.toFixed(0)}%</span>`;
        else if (diff < -0.1) badgeHtml = `<span class="pct-badge dn">${diff.toFixed(0)}%</span>`;
        else badgeHtml = `<span class="pct-badge eq">0%</span>`;
      }
    } else {
      badgeHtml = `<span class="pct-badge eq">—</span>`;
    }

    var barClass = currentVal === maxVal && maxVal > 0 ? "cbar best" : "cbar";
    var barColor = state.poMetric === "volume" ? "var(--accent)" : "var(--purple)";
    if (currentVal === maxVal && maxVal > 0) barColor = "linear-gradient(180deg, var(--accent2), var(--accent))";

    var dtObj = new Date(d.date);
    var xLabel = (dtObj.getMonth() + 1) + "/" + dtObj.getDate();

    barHtml += `
      <div class="bar-col">
        ${badgeHtml}
        <span class="bar-v">${currentVal.toFixed(0)}</span>
        <div class="${barClass}" style="height:${hPct}%; background:${barColor};"></div>
      </div>`;

    xHtml += `<div class="xl">${xLabel}</div>`;
  });

  return `
    <div class="chart-wrap">
      <div class="chart-area">
        <div class="chart-y">${yLabels}</div>
        <div class="chart-body">
          <div class="chart-grid">${gridLines}</div>
          <div class="chart-bars">${barHtml}</div>
        </div>
      </div>
      <div class="chart-xl" style="padding-left:54px;">${xHtml}</div>
    </div>`;
}

function buildPOStatsHtml(data) {
  // ปรับปรุงจุดที่ 2: ดักจับกรณีอาเรย์ว่างเปล่าเพื่อป้องกันความล้มเหลวของการประมวลผล (Prevent Stats Crash)
  if (data.length === 0) {
    return `
      <div class="po-stats">
        <div class="po-si"><div class="po-sv">—</div><div class="po-sl">สถิติสูงสุด</div></div>
        <div class="po-si"><div class="po-sv">—</div><div class="po-sl">การเปลี่ยนแปลงล่าสุด</div></div>
      </div>`;
  }

  var vals = data.map(function (d) { return state.poMetric === "volume" ? d.totalVolume : d.max1RM; });
  var best = Math.max.apply(null, vals);
  
  var latestVal = vals[vals.length - 1];
  var changeHtml = '<div class="po-sv">—</div>';

  if (vals.length > 1) {
    var prev = vals[vals.length - 2];
    if (prev > 0) {
      var diff = ((latestVal - prev) / prev) * 100;
      if (diff > 0) changeHtml = `<div class="po-sv up">+${diff.toFixed(1)}%</div>`;
      else if (diff < 0) changeHtml = `<div class="po-sv dn">${diff.toFixed(1)}%</div>`;
      else changeHtml = `<div class="po-sv">0.0%</div>`;
    }
  }

  var unit = state.poMetric === "volume" ? " kg" : " kg";

  return `
    <div class="po-stats">
      <div class="po-si">
        <div class="po-sv" style="color:var(--accent);">${best.toFixed(0)}<span style="font-size:0.7rem; font-weight:300;">${unit}</span></div>
        <div class="po-sl">สถิติสูงสุด (All-Time Best)</div>
      </div>
      <div class="po-si">
        ${changeHtml}
        <div class="po-sl">การพัฒนาเทียบกับเซสชันก่อนหน้า</div>
      </div>
    </div>`;
}

});

document.getElementById("rtStartBtn").addEventListener("click", function () {
  if (rtIsRunning) rtPauseTimer();
  else rtStartTimer();
});

document.getElementById("rtResetBtn").addEventListener("click", rtResetTimer);

document.querySelectorAll("#rtPresets .rt-pb").forEach(function (btn) {
  btn.addEventListener("click", function () {
    document.querySelectorAll("#rtPresets .rt-pb").forEach(function (b) { b.classList.remove("on"); });
    this.classList.add("on");
    rtDuration = parseInt(this.getAttribute("data-s"));
    rtResetTimer();
  });
});

document.getElementById("rtSetCustom").addEventListener("click", function () {
  var val = parseInt(document.getElementById("rtCustom").value);
  if (val > 0) {
    document.querySelectorAll("#rtPresets .rt-pb").forEach(function (b) { b.classList.remove("on"); });
    rtDuration = val;
    rtResetTimer();
    document.getElementById("rtCustom").value = "";
  }
});

document.getElementById("rtCustom").addEventListener("keydown", function (e) {
  if (e.key === "Enter") document.getElementById("rtSetCustom").click();
});

function rtUpdateUI() {
  var sec = rtIsRunning ? rtTimeLeft : rtDuration;
  var m = Math.floor(sec / 60);
  var s = sec % 60;
  var disp = (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
  document.getElementById("rtDisplay").textContent = disp;

  var circle = document.getElementById("rtCircle");
  var circumference = 2 * Math.PI * 62;
  circle.style.strokeDasharray = circumference;

  if (!rtIsRunning) {
    circle.style.strokeDashoffset = 0;
    document.getElementById("rtStartBtn").textContent = "เริ่ม";
    document.getElementById("rtStartBtn").className = "rt-cbtn start";
    return;
  }

  var pct = rtTimeLeft / rtDuration;
  circle.style.strokeDashoffset = circumference * (1 - pct);

  var fabTime = document.getElementById("rtFabTime");
  var icon = document.getElementById("rtIcon");
  if (sec < 60) {
    icon.style.display = "none";
    fabTime.style.display = "inline";
    fabTime.textContent = sec;
  } else {
    icon.style.display = "inline";
    fabTime.style.display = "none";
  }
}

function rtStartTimer() {
  if (!rtIsRunning && rtTimeLeft === 0) rtTimeLeft = rtDuration;
  rtIsRunning = true;
  document.getElementById("rtStartBtn").textContent = "พัก";
  document.getElementById("rtStartBtn").className = "rt-cbtn pause";
  document.getElementById("rtFab").classList.add("pulse");

  rtInterval = setInterval(function () {
    rtTimeLeft--;
    if (rtTimeLeft <= 0) {
      clearInterval(rtInterval);
      rtIsRunning = false;
      rtTimeLeft = 0;
      document.getElementById("rtFab").className = "rt-fab done";
      document.getElementById("rtIcon").className = "fa-solid fa-bell";
      document.getElementById("rtFabTime").style.display = "none";
      document.getElementById("rtIcon").style.display = "inline";
      document.getElementById("rtDisplay").textContent = "หมดเวลา!";
      if (window.navigator.vibrate) window.navigator.vibrate([400, 200, 400]);
    } else {
      rtUpdateUI();
    }
  }, 1000);
  rtUpdateUI();
}

function rtPauseTimer() {
  rtIsRunning = false;
  clearInterval(rtInterval);
  document.getElementById("rtFab").classList.remove("pulse");
  rtUpdateUI();
}

function rtResetTimer() {
  rtIsRunning = false;
  clearInterval(rtInterval);
  rtTimeLeft = 0;
  document.getElementById("rtFab").className = "rt-fab";
  document.getElementById("rtIcon").className = "fa-solid fa-clock";
  document.getElementById("rtFabTime").style.display = "none";
  document.getElementById("rtIcon").style.display = "inline";
  document.getElementById("rtFab").classList.remove("pulse");
  rtUpdateUI();
}

// INTIALIZING APPLICATION
renderApp();
</script>
</body>
</html>
