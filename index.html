<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORKOUT PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;600;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ลูกเล่นพิเศษ: ตัวแปรสำหรับทำ Animated Border */
@property --angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}

:root {
  --bg: #03030a;
  --bg2: #08081a;
  --bg3: #0d0d25;
  --glass: rgba(10, 10, 30, 0.6);
  --glass2: rgba(20, 20, 50, 0.4);
  --glass3: rgba(255,255,255,0.05);
  --border: rgba(100, 100, 255, 0.1);
  --border2: rgba(100, 100, 255, 0.25);
  --fg: #ffffff;
  --fg2: #d0d0f0;
  --fg3: #606088;
  --accent: #00f0ff;
  --accent2: #b000ff;
  --accent3: #ff0080;
  --glow: rgba(0, 240, 255, 0.5);
  --glow2: rgba(0, 240, 255, 0.1);
  --red: #ff3050;
  --green: #00ff88;
  --blue: #0080ff;
  --purple: #b000ff;
  --d1: #00f0ff; --d2: #00ff88; --d3: #b000ff; --d4: #ff0080; 
  --d5: #ffaa00; --d6: #0080ff; --d7: #ff5577;
  --radius: 20px;
  --radius2: 14px;
  --radius3: 10px;
  --bounce: cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; box-shadow: 0 0 10px var(--glow); }

body {
  font-family: 'Space Grotesk', 'Kanit', sans-serif;
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ==========================================
   BG: Cyber Morphing Blobs & Grid
   ========================================== */
.bg {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0; overflow: hidden;
}

.bg .grid {
  position: absolute; inset: 0;
  background-image: 
    linear-gradient(rgba(100, 100, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100, 100, 255, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  transform: perspective(500px) rotateX(20deg) scale(2);
  transform-origin: center top;
  mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
}

.bg .orb {
  position: absolute; border-radius: 50%;
  filter: blur(120px); opacity: 0.15;
  animation: morphBlob 20s ease-in-out infinite alternate;
}

.bg .orb:nth-child(2) { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -100px; }
.bg .orb:nth-child(3) { width: 500px; height: 500px; background: var(--accent2); bottom: -200px; right: -100px; animation-delay: -5s; animation-direction: alternate-reverse;}
.bg .orb:nth-child(4) { width: 400px; height: 400px; background: var(--accent3); top: 40%; left: 40%; animation-delay: -10s; }

@keyframes morphBlob {
  0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: translate(0, 0) scale(1); }
  50% { border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; transform: translate(50px, -30px) scale(1.1); }
  100% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; transform: translate(-20px, 20px) scale(0.95); }
}

.app {
  position: relative; z-index: 1;
  max-width: 520px; margin: 0 auto;
  padding: 16px 16px 140px;
}

/* ==========================================
   Header: Glitch Effect
   ========================================== */
.hdr { text-align: center; padding: 32px 0 8px; position: relative; }

.hdr h1 {
  font-family: 'Kanit'; font-weight: 900; font-size: 2rem; letter-spacing: 6px;
  color: var(--fg); position: relative; display: inline-block;
  text-shadow: 0 0 10px var(--glow);
  animation: glitchText 3s infinite;
}

.hdr h1:before, .hdr h1:after {
  content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--bg); overflow: hidden;
}

.hdr h1:before {
  left: 2px; text-shadow: -2px 0 var(--accent3);
  animation: glitch-anim-1 2s infinite linear alternate-reverse;
  clip-path: inset(0 0 80% 0);
}

.hdr h1:after {
  left: -2px; text-shadow: 2px 0 var(--accent);
  animation: glitch-anim-2 2s infinite linear alternate-reverse;
  clip-path: inset(80% 0 0 0);
}

@keyframes glitch-anim-1 {
  0% { clip-path: inset(20% 0 60% 0); } 20% { clip-path: inset(60% 0 10% 0); } 
  40% { clip-path: inset(40% 0 40% 0); } 60% { clip-path: inset(80% 0 5% 0); }
  80% { clip-path: inset(10% 0 70% 0); } 100% { clip-path: inset(50% 0 30% 0); }
}
@keyframes glitch-anim-2 {
  0% { clip-path: inset(60% 0 20% 0); } 20% { clip-path: inset(10% 0 70% 0); } 
  40% { clip-path: inset(50% 0 30% 0); } 60% { clip-path: inset(20% 0 60% 0); }
  80% { clip-path: inset(70% 0 10% 0); } 100% { clip-path: inset(30% 0 50% 0); }
}
@keyframes glitchText {
  0%, 100% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(-2px, -2px); }
  60% { transform: translate(2px, 2px); }
  80% { transform: translate(2px, -2px); }
}

.hdr .sub {
  color: var(--accent); font-size: 0.7rem; letter-spacing: 4px;
  text-transform: uppercase; margin-top: 6px; font-weight: 400;
  text-shadow: 0 0 8px var(--glow2);
}
.hdr .line {
  width: 100px; height: 2px; margin: 12px auto 0;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  box-shadow: 0 0 15px var(--glow2);
}

/* ==========================================
   Tabs: Neon Slider
   ========================================== */
.tabs {
  display: flex; gap: 4px; background: var(--glass);
  border-radius: var(--radius); padding: 4px; margin: 24px 0 20px;
  border: 1px solid var(--border); position: relative;
  backdrop-filter: blur(20px);
}

.tbtn {
  flex: 1; padding: 12px 4px; border: none; background: transparent;
  color: var(--fg3); font-family: 'Kanit'; font-weight: 600; font-size: 0.8rem;
  border-radius: var(--radius2); cursor: pointer;
  transition: all 0.4s var(--bounce); display: flex;
  align-items: center; justify-content: center; gap: 8px;
  position: relative; z-index: 2; letter-spacing: 0.5px;
}

.tbtn.on {
  color: #000; font-weight: 800;
  background: var(--accent);
  box-shadow: 0 0 20px var(--glow), inset 0 1px 0 rgba(255,255,255,0.2);
  text-shadow: 0 1px 0 rgba(0,0,0,0.2);
}

.tbtn:not(.on):hover {
  color: var(--fg2); background: var(--glass2);
  text-shadow: 0 0 8px var(--glow2);
}

.tcon { display: none; }
.tcon.on { display: block; animation: fadeUp 0.4s var(--bounce); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(15px) scale(0.98); filter: blur(4px); }
  to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

/* ==========================================
   Day Selector: Animated Borders
   ========================================== */
.day-sel { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.day-sel::-webkit-scrollbar { display: none; }

.dchip {
  flex-shrink: 0; padding: 10px 18px; border-radius: var(--radius3);
  border: 1px solid var(--border); background: var(--glass);
  color: var(--fg3); font-family: 'Kanit'; font-weight: 600; font-size: 0.8rem;
  cursor: pointer; transition: all 0.4s var(--bounce); display: flex;
  align-items: center; gap: 8px; position: relative; overflow: hidden;
  backdrop-filter: blur(10px);
}

.dchip .cnt {
  background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 6px;
  font-size: 0.68rem; font-family: 'Space Grotesk';
}

.dchip.on {
  color: #000; border-color: transparent;
  box-shadow: 0 4px 25px rgba(0,0,0,0.4);
  transform: scale(1.05);
}

/* Dynamic Colors for Days */
.dchip[data-d="1"].on { background: var(--d1); box-shadow: 0 0 25px rgba(0, 240, 255, 0.4); }
.dchip[data-d="2"].on { background: var(--d2); box-shadow: 0 0 25px rgba(0, 255, 136, 0.4); }
.dchip[data-d="3"].on { background: var(--d3); box-shadow: 0 0 25px rgba(176, 0, 255, 0.4); }
.dchip[data-d="4"].on { background: var(--d4); box-shadow: 0 0 25px rgba(255, 0, 128, 0.4); }
.dchip[data-d="5"].on { background: var(--d5); box-shadow: 0 0 25px rgba(255, 170, 0, 0.4); }
.dchip[data-d="6"].on { background: var(--d6); box-shadow: 0 0 25px rgba(0, 128, 255, 0.4); }
.dchip[data-d="7"].on { background: var(--d7); box-shadow: 0 0 25px rgba(255, 85, 119, 0.4); }

/* ==========================================
   Buttons & Cards: Holographic UI
   ========================================== */
.addbtn {
  width: 100%; padding: 16px; border: 1px dashed var(--border2);
  border-radius: var(--radius); background: var(--glass);
  color: var(--fg3); font-family: 'Kanit'; font-weight: 600; font-size: 0.85rem;
  cursor: pointer; transition: all 0.4s var(--bounce); display: flex;
  align-items: center; justify-content: center; gap: 10px;
  margin-bottom: 16px; position: relative; overflow: hidden;
  backdrop-filter: blur(10px);
}

.addbtn:hover {
  border-color: var(--accent); color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 0 30px var(--glow2), inset 0 0 30px var(--glow2);
  background: rgba(0, 240, 255, 0.05);
}

.elist { display: flex; flex-direction: column; gap: 12px; }

.ecard {
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px;
  transition: all 0.5s var(--bounce); animation: cardIn 0.5s var(--bounce);
  position: relative; overflow: hidden; backdrop-filter: blur(20px);
}

/* Sweep Light Effect on Hover */
.ecard::after {
  content: ''; position: absolute; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.05) 45%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 55%, transparent 60%);
  transform: translateX(-100%); transition: 0.8s;
  pointer-events: none;
}

.ecard:hover {
  border-color: var(--accent);
  transform: translateY(-5px) scale(1.01);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px var(--glow2);
}

.ecard:hover::after { transform: translateX(100%); }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.95); filter: blur(4px); }
  to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

.etop { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }

.ename {
  font-family: 'Kanit'; font-weight: 800; font-size: 0.95rem; color: var(--fg);
  flex: 1; cursor: pointer; padding: 4px 8px; border-radius: var(--radius3);
  border: 1px solid transparent; transition: 0.3s; outline: none;
  min-width: 0; word-break: break-word;
}
.ename:hover { background: var(--glass2); }
.ename:focus {
  background: var(--bg3); border-color: var(--accent);
  cursor: text; box-shadow: 0 0 15px var(--glow2);
}

.ibtn {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; transition: all 0.3s var(--bounce); flex-shrink: 0;
  margin-left: 8px; background: var(--glass); backdrop-filter: blur(10px);
}
.ibtn.del { color: var(--red); }
.ibtn.del:hover {
  background: var(--red); color: #fff; border-color: var(--red);
  transform: scale(1.15) rotate(10deg); box-shadow: 0 0 20px rgba(255, 48, 80, 0.5);
}
.ibtn.dup { color: var(--green); }
.ibtn.dup:hover {
  background: var(--green); color: #000; border-color: var(--green);
  transform: scale(1.15) rotate(-10deg); box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
}

.estats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

.sbox {
  background: var(--bg2); border-radius: var(--radius3); padding: 12px 8px;
  text-align: center; border: 1px solid var(--border); transition: 0.3s;
}
.sbox:hover { border-color: var(--accent); box-shadow: 0 0 15px var(--glow2); }

.slbl { font-size: 0.55rem; color: var(--fg3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; font-weight: 500; }

.sval {
  font-family: 'Kanit'; font-weight: 800; font-size: 1.1rem; color: var(--accent);
  cursor: pointer; padding: 2px 4px; border-radius: 6px; border: 1px solid transparent;
  outline: none; transition: 0.3s; display: inline-block;
}
.sval:hover { background: var(--glass2); }
.sval:focus { background: var(--bg); border-color: var(--accent); cursor: text; box-shadow: 0 0 15px var(--glow2); }
.sunit { font-size: 0.6rem; color: var(--fg3); font-weight: 300; }

/* Summary Bar */
.sbar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
.sitem {
  background: var(--glass); border: 1px solid var(--border); border-radius: var(--radius2);
  padding: 16px 10px; text-align: center; position: relative; overflow: hidden;
  backdrop-filter: blur(10px); transition: 0.3s var(--bounce);
}
.sitem:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
.snum { font-family: 'Kanit'; font-weight: 900; font-size: 1.4rem; text-shadow: 0 0 10px currentColor; }
.slbl2 { font-size: 0.55rem; color: var(--fg3); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; font-weight: 500; }

.dhdr { font-family: 'Kanit'; font-weight: 600; font-size: 0.78rem; color: var(--fg3); padding: 12px 4px 8px; display: flex; align-items: center; gap: 12px; }
.dhdr::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--accent), transparent); box-shadow: 0 0 8px var(--glow2); }
.ddel { background: transparent; border: 1px solid var(--border); color: var(--fg3); cursor: pointer; font-size: 0.68rem; padding: 4px 10px; border-radius: 6px; transition: 0.3s; font-family: 'Space Grotesk'; }
.ddel:hover { border-color: var(--red); color: var(--red); background: rgba(255, 48, 80, 0.1); box-shadow: 0 0 15px rgba(255, 48, 80, 0.2); }

.drow { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.dtit { font-family: 'Kanit'; font-weight: 800; font-size: 1.1rem; letter-spacing: 0.5px; text-shadow: 0 0 10px currentColor; }
.clrbtn { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--glass); color: var(--fg3); font-family: 'Space Grotesk'; font-size: 0.7rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 6px; font-weight: 500; }
.clrbtn:hover { border-color: var(--red); color: var(--red); background: rgba(255, 48, 80, 0.1); box-shadow: 0 0 15px rgba(255, 48, 80, 0.2); }

.empty { text-align: center; padding: 60px 20px; color: var(--fg3); }
.empty i { font-size: 3rem; margin-bottom: 16px; opacity: 0.2; display: block; color: var(--accent); }
.empty p { font-size: 0.85rem; font-weight: 300; letter-spacing: 0.5px; }

/* ==========================================
   Modal: Cyber Overlay
   ========================================== */
.mo { position: fixed; inset: 0; background: rgba(3, 3, 10, 0.9); backdrop-filter: blur(16px); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
.mo.show { display: flex; animation: modalFade 0.3s ease; }
@keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }

.md {
  background: var(--bg2); border-radius: 28px 28px 0 0; width: 100%; max-width: 520px;
  max-height: 88vh; overflow-y: auto; padding: 24px 20px 50px;
  animation: modalSlide 0.4s var(--bounce); border: 1px solid var(--border); border-bottom: none;
  position: relative; box-shadow: 0 -20px 60px rgba(0,0,0,0.5);
}

/* Animated Top Border */
.md::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3), var(--accent));
  background-size: 300% 100%;
  animation: borderGlow 3s linear infinite;
}

@keyframes borderGlow { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }

@keyframes modalSlide { from { transform: translateY(100%); } to { transform: translateY(0); } }
.mh { width: 40px; height: 4px; background: var(--accent); border-radius: 4px; margin: 0 auto 20px; box-shadow: 0 0 10px var(--glow); }
.mt { font-family: 'Kanit'; font-weight: 800; font-size: 1.2rem; margin-bottom: 20px; letter-spacing: 0.5px; color: var(--fg); }

.sbox2 { position: relative; margin-bottom: 16px; }
.sbox2 > i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 0.9rem; }
.sinp { width: 100%; padding: 14px 16px 14px 46px; border-radius: var(--radius2); border: 1px solid var(--border); background: var(--glass); color: var(--fg); font-family: 'Space Grotesk'; font-size: 0.9rem; outline: none; transition: 0.3s; backdrop-filter: blur(10px); }
.sinp:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--glow2); }

.cchips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 14px; scrollbar-width: none; }
.cchips::-webkit-scrollbar { display: none; }
.cc { flex-shrink: 0; padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--glass); color: var(--fg3); font-family: 'Space Grotesk'; font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: all 0.3s var(--bounce); white-space: nowrap; }
.cc.on { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; box-shadow: 0 0 20px var(--glow); transform: scale(1.05); }
.cc:not(.on):hover { border-color: var(--accent); color: var(--accent); transform: scale(1.05); }

.epkl { display: flex; flex-direction: column; gap: 4px; max-height: 35vh; overflow-y: auto; padding-right: 4px; }
.epki { padding: 12px 16px; border-radius: var(--radius3); cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: all 0.3s var(--bounce); border: 1px solid transparent; }
.epki:hover { background: var(--glass2); border-color: var(--accent); transform: translateX(5px); box-shadow: 0 0 15px var(--glow2); }
.pkn { font-weight: 600; font-size: 0.9rem; }
.pkc { font-size: 0.65rem; color: var(--accent); margin-top: 2px; font-weight: 400; text-transform: uppercase; letter-spacing: 1px; }
.pkico { width: 36px; height: 36px; border-radius: var(--radius3); background: var(--glass); border: 1px solid var(--accent); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; box-shadow: 0 0 10px var(--glow2); }

.dform { display: none; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); }
.dform.show { display: block; animation: fadeUp 0.4s var(--bounce); }
.frow { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.fg { margin-bottom: 18px; }
.fl { display: block; font-size: 0.65rem; color: var(--fg3); margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; }
.finp { width: 100%; padding: 14px; border-radius: var(--radius3); border: 1px solid var(--border); background: var(--glass); color: var(--fg); font-family: 'Kanit'; font-weight: 700; font-size: 1.1rem; outline: none; transition: 0.3s; text-align: center; }
.finp:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--glow2); }
.finp::placeholder { color: var(--fg3); font-weight: 300; font-size: 0.8rem; }

.sbtn2 {
  width: 100%; padding: 16px; border: none; border-radius: var(--radius2);
  background: linear-gradient(135deg, var(--accent2), var(--accent), var(--accent));
  color: #000; font-family: 'Kanit'; font-weight: 900; font-size: 1.05rem; cursor: pointer;
  transition: all 0.4s var(--bounce); box-shadow: 0 4px 30px var(--glow);
  position: relative; overflow: hidden; letter-spacing: 1px; text-transform: uppercase;
}
.sbtn2::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent, rgba(255,255,255,0.3), transparent); transform: translateX(-100%); transition: 0.6s; }
.sbtn2:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 40px var(--glow); }
.sbtn2:hover::before { transform: translateX(100%); }
.sbtn2:active { transform: translateY(1px) scale(0.98); }

.dpk { display: flex; gap: 6px; margin-bottom: 18px; }
.dpb { flex: 1; padding: 12px 4px; border-radius: var(--radius3); border: 1px solid var(--border); background: var(--glass); color: var(--fg3); font-family: 'Kanit'; font-weight: 800; font-size: 0.9rem; cursor: pointer; transition: all 0.3s var(--bounce); }
.dpb.on { color: #000; border-color: transparent; transform: scale(1.05); }
.dpb[data-v="1"].on { background: var(--d1); box-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }
.dpb[data-v="2"].on { background: var(--d2); box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }
.dpb[data-v="3"].on { background: var(--d3); box-shadow: 0 0 20px rgba(176, 0, 255, 0.4); }
.dpb[data-v="4"].on { background: var(--d4); box-shadow: 0 0 20px rgba(255, 0, 128, 0.4); }

/* ==========================================

.chart-grid { position: absolute; top: 0; left: 0; right: 0; bottom: 28px; pointer-events: none; }

.bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 56px; }

.pct-badge { font-family: 'Space Grotesk'; font-weight: 700; font-size: 0.55rem; padding: 2px 6px; border-radius: 6px; margin-bottom: 4px; white-space: nowrap; }

/* Neon Tube Bar */
.cbar { width: 60%; border-radius: 6px 6px 0 0; min-height: 4px; transition: height 0.8s var(--bounce); position: relative; overflow: hidden; background: var(--accent); box-shadow: 0 0 15px var(--glow), inset 0 0 10px rgba(255,255,255,0.2); }

.rt-fab {
  position: fixed; bottom: 24px; right: 24px; z-index: 90;

.rt-fab.done { animation: rtDone 0.5s ease infinite alternate; border-color: var(--accent3); color: var(--accent3); box-shadow: 0 0 40px rgba(255, 0, 128, 0.4); }
@keyframes rtDone { from { box-shadow: 0 0 0 0 rgba(255, 0, 128, 0.4); } to { box-shadow: 0 0 0 18px transparent; } }

.rt-panel {
  position: fixed; bottom: 100px; right: 16px; z-index: 89; width: 280px;
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.7); display: none;

}
.rt-panel.show { display: block; }

.rt-ring-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
.rt-ring { position: relative; width: 150px; height: 150px; }

.rt-pb { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--glass); color: var(--fg3); font-family: 'Space Grotesk'; font-weight: 600; font-size: 0.75rem; cursor: pointer; transition: all 0.3s var(--bounce); }
.rt-pb.on { background: var(--accent); border-color: var(--accent); color: #000; box-shadow: 0 0 20px var(--glow); transform: scale(1.1); }
.rt-pb:not(.on):hover { border-color: var(--accent); color: var(--accent); transform: scale(1.05); }

.rt-custom { display: flex; gap: 8px; margin-bottom: 16px; }
.rt-cinp { flex: 1; padding: 10px 14px; border-radius: var(--radius3); border: 1px solid var(--border); background: var(--glass); color: var(--fg); font-family: 'Kanit'; font-weight: 600; font-size: 0.9rem; outline: none; text-align: center; transition: 0.3s; }
.rt-cinp:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--glow2); }

.rt-ctrls { display: flex; gap: 10px; }
.rt-cbtn { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius3); font-family: 'Kanit'; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.3s var(--bounce); background: var(--glass); color: var(--fg2); }
.rt-cbtn.start { background: var(--green); border-color: var(--green); color: #000; box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
.rt-cbtn.start:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 255, 136, 0.5); }

@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
@media (max-width: 400px) {
  .chart-y { width: 40px; } .chart-y span { font-size: 0.5rem; } .bar-v { font-size: 0.55rem; }
  .rt-panel { right: 8px; width: 260px; } .rt-ring { width: 120px; height: 120px; } .rt-ring .rtime { font-size: 2rem; }
}
</style>

<script>
/* ============================================================
   ฐานข้อมูลและ State (ไม่มีการเปลี่ยนแปลงจากเวอร์ชันแก้บัค)
   ============================================================ */
var EXERCISES = [
  { name: "Bench Press", cat: "หน้าอก", icon: "fa-dumbbell" }, { name: "Incline Dumbbell Press", cat: "หน้าอก", icon: "fa-dumbbell" },
  { name: "Cable Crossover", cat: "หน้าอก", icon: "fa-arrows-left-right" }, { name: "Chest Dip", cat: "หน้าอก", icon: "fa-arrow-down" },
  { name: "Push Up", cat: "หน้าอก", icon: "fa-hand-fist" }, { name: "Machine Chest Press", cat: "หน้าอก", icon: "fa-dumbbell" },
  { name: "Fly Machine", cat: "หน้าอก", icon: "fa-arrows-left-right" }, { name: "Deadlift", cat: "หลัง", icon: "fa-weight-hanging" },
  { name: "Pull Up", cat: "หลัง", icon: "fa-arrow-up" }, { name: "Barbell Row", cat: "หลัง", icon: "fa-dumbbell" },
  { name: "Lat Pulldown", cat: "หลัง", icon: "fa-arrow-down" }, { name: "Seated Cable Row", cat: "หลัง", icon: "fa-arrows-left-right" },
  { name: "T-Bar Row", cat: "หลัง", icon: "fa-dumbbell" }, { name: "Overhead Press", cat: "ไหล่", icon: "fa-dumbbell" },
  { name: "Lateral Raise", cat: "ไหล่", icon: "fa-arrows-left-right" }, { name: "Front Raise", cat: "ไหล่", icon: "fa-arrow-up" },
  { name: "Reverse Fly", cat: "ไหล่", icon: "fa-arrows-left-right" }, { name: "Arnold Press", cat: "ไหล่", icon: "fa-dumbbell" },
  { name: "Face Pull", cat: "ไหล่", icon: "fa-arrows-left-right" }, { name: "Barbell Curl", cat: "แขน", icon: "fa-dumbbell" },
  { name: "Hammer Curl", cat: "แขน", icon: "fa-dumbbell" }, { name: "Tricep Pushdown", cat: "แขน", icon: "fa-arrow-down" },
  { name: "Skull Crusher", cat: "แขน", icon: "fa-dumbbell" }, { name: "Preacher Curl", cat: "แขน", icon: "fa-dumbbell" },
  { name: "Overhead Tricep Ext", cat: "แขน", icon: "fa-arrow-up" }, { name: "Squat", cat: "ขา", icon: "fa-person" },
  { name: "Leg Press", cat: "ขา", icon: "fa-weight-hanging" }, { name: "Romanian Deadlift", cat: "ขา", icon: "fa-weight-hanging" },
  { name: "Leg Extension", cat: "ขา", icon: "fa-arrow-up" }, { name: "Leg Curl", cat: "ขา", icon: "fa-arrow-down" },
  { name: "Bulgarian Split Sq", cat: "ขา", icon: "fa-person" }, { name: "Calf Raise", cat: "ขา", icon: "fa-arrow-up" },
  { name: "Hip Thrust", cat: "ขา", icon: "fa-person" }, { name: "Lunge", cat: "ขา", icon: "fa-person-walking" },
  { name: "Crunch", cat: "ท้อง", icon: "fa-person" }, { name: "Plank", cat: "ท้อง", icon: "fa-person" },
  { name: "Leg Raise", cat: "ท้อง", icon: "fa-arrow-up" }, { name: "Russian Twist", cat: "ท้อง", icon: "fa-rotate" },
  { name: "Ab Wheel", cat: "ท้อง", icon: "fa-circle" }, { name: "Running", cat: "คาร์ดิโอ", icon: "fa-person-running" },
  { name: "Cycling", cat: "คาร์ดิโอ", icon: "fa-bicycle" }, { name: "Jump Rope", cat: "คาร์ดิโอ", icon: "fa-heart-pulse" },
  { name: "Rowing", cat: "คาร์ดิโอ", icon: "fa-water" }
];

var CATEGORIES = ["ทั้งหมด"];
var catSet = {};
for (var ci = 0; ci < EXERCISES.length; ci++) catSet[EXERCISES[ci].cat] = true;
for (var ck = 0; ck < Object.keys(catSet).length; ck++) CATEGORIES.push(Object.keys(catSet)[ck]);

var currentTab = "plan", currentDay = 1, selectedCategory = "ทั้งหมด", pickedExercise = null, modalMode = "plan", modalDay = 1, poSelectedExercise = null;

function loadPlan() { try { var d = JSON.parse(localStorage.getItem("wp_plan")); if (d && typeof d === "object") return d; } catch(e){} return { "1": [], "2": [], "3": [], "4": [], "5": [], "6": [], "7": [] }; }
function savePlan(d) { localStorage.setItem("wp_plan", JSON.stringify(d)); }
function loadHistory() { try { var d = JSON.parse(localStorage.getItem("wp_hist")); if (Array.isArray(d)) return d; } catch(e){} return []; }
function saveHistory(d) { localStorage.setItem("wp_hist", JSON.stringify(d)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function escapeHtml(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

var toastTimer = null;
function showToast(m, t) {
  t = t || "ok"; var el = document.getElementById("toast"), ic = el.querySelector("i");
  document.getElementById("toastMsg").textContent = m; el.className = "toast " + t;
  ic.className = (t === "ok") ? "fas fa-check-circle" : "fas fa-trash";
  clearTimeout(toastTimer); requestAnimationFrame(function () { el.classList.add("show"); });
  toastTimer = setTimeout(function () { el.classList.remove("show"); }, 2200);
}

document.querySelectorAll(".tbtn").forEach(function (b) {
  b.addEventListener("click", function () {
    document.querySelectorAll(".tbtn").forEach(function(x) { x.classList.remove("on"); x.setAttribute("aria-selected","false"); });
    document.querySelectorAll(".tcon").forEach(function(x) { x.classList.remove("on"); });
    this.classList.add("on"); this.setAttribute("aria-selected","true");
    currentTab = this.getAttribute("data-t"); document.getElementById("tp-" + currentTab).classList.add("on");
    renderCurrentTab();
  });
});

function renderCurrentTab() { if(currentTab==="plan") renderPlan(); else if(currentTab==="history") renderHistory(); else renderProgress(); }

var DAY_COLORS = ["", "var(--d1)", "var(--d2)", "var(--d3)", "var(--d4)", "var(--d5)", "var(--d6)", "var(--d7)"];

function renderPlan() {
  var plan = loadPlan(), items = plan[currentDay] || [], color = DAY_COLORS[currentDay], totalSets=0, totalVol=0;
  for(var i=0; i<items.length; i++) { var s=parseFloat(items[i].sets)||0, r=parseFloat(items[i].reps)||0, w=parseFloat(items[i].weight)||0; totalSets+=s; totalVol+=s*r*w; }
  var html = '<div class="day-sel" id="daySelector">';
  for(var d=1; d<=7; d++) { var cnt=(plan[d]||[]).length; html += '<button class="dchip'+(d===currentDay?" on":"")+'" data-day="'+d+'">วัน '+d+'<span class="cnt">'+cnt+'</span></button>'; }

  if(items.length>0) { html += '<div class="sbar"><div class="sitem"><div class="snum" style="color:'+color+'">'+items.length+'</div><div class="slbl2">ท่า</div></div><div class="sitem"><div class="snum" style="color:'+color+'">'+totalSets+'</div><div class="slbl2">เซ็ต</div></div><div class="sitem"><div class="snum" style="color:'+color+'">'+totalVol.toLocaleString()+'</div><div class="slbl2">ปริมาณ kg</div></div></div>'; }

  var hist=loadHistory(), sorted=hist.slice().sort(function(a,b){return b.date.localeCompare(a.date);}), grouped={}, dayNames=["อา.","จ.","อ.","พ.","พฤ.","ศ.","ส."];

    var del=e.target.closest('[data-action="del"]'), dup=e.target.closest('[data-action="dup"]');

/* Timer */
var rtDuration=60, rtRemaining=60, rtInterval=null, rtRunning=false, rtCircumference=2*Math.PI*60;
function updateTimerDisplay() { var m=Math.floor(rtRemaining/60), s=rtRemaining%60; document.getElementById("rtDisplay").textContent=m+":"+(s<10?"0":"")+s; document.getElementById("rtRing").style.strokeDashoffset=rtCircumference*(1-rtRemaining/rtDuration); }

document.getElementById("rtSetCustom").addEventListener("click", function(){ var v=parseInt(document.getElementById("rtCustom").value); if(v>0){ document.querySelectorAll("#rtPresets .rt-pb").forEach(function(x){x.classList.remove("on");}); rtDuration=v; resetTimer(); } });

/* Progress */
function renderProgress() {
  var hist=loadHistory(), exMap={}, exNames=[];
  for(var i=0;i<hist.length;i++) { var n=hist[i].name; if(!exMap[n]) exMap[n]=0; exMap[n]++; }
  exNames=Object.keys(exMap).sort(function(a,b){return exMap[b]-exMap[a];});
  if(exNames.length===0) { document.getElementById("tp-progress").innerHTML='<div class="empty"><i class="fas fa-chart-line"></i><p>ยังไม่มีข้อมูล Progress</p></div>'; return; }
  if(!poSelectedExercise || exNames.indexOf(poSelectedExercise)===-1) poSelectedExercise=exNames[0];
  var html='<div class="po-exc">'; for(var e=0;e<exNames.length;e++) html+='<button class="po-chip'+(exNames[e]===poSelectedExercise?" on":"")+'" data-ex="'+exNames[e]+'">'+exNames[e]+' <span class="poc">'+exMap[exNames[e]]+'</span></button>'; html+='</div>';
  var exHist=hist.filter(function(h){return h.name===poSelectedExercise;}).sort(function(a,b){return a.date.localeCompare(b.date);}), chartData=[], tempG={};
  for(var j=0;j<exHist.length;j++) { var dt=exHist[j].date; if(!tempG[dt]) tempG[dt]=0; tempG[dt]+=(parseFloat(exHist[j].weight)||0)*(parseFloat(exHist[j].reps)||0)*(parseFloat(exHist[j].sets)||0); }
  var dates=Object.keys(tempG); for(var k=0;k<dates.length;k++) chartData.push({date:dates[k], vol:tempG[dates[k]]});
  var totalVol=chartData.reduce(function(a,c){return a+c.vol;},0), maxVol=Math.max.apply(null,chartData.map(function(c){return c.vol;})), bestDay=chartData.find(function(c){return c.vol===maxVol;}), lastVol=chartData.length>0?chartData[chartData.length-1].vol:0, prevVol=chartData.length>1?chartData[chartData.length-2].vol:0, diff=lastVol-prevVol, diffPct=prevVol===0?0:Math.round((diff/prevVol)*100);
  html+='<div class="po-stats"><div class="po-si"><div class="po-sv">'+totalVol.toLocaleString()+' <span style="font-size:.7rem;color:var(--fg3)">kg</span></div><div class="po-sl">Total Volume</div></div><div class="po-si"><div class="po-sv">'+(bestDay?bestDay.vol.toLocaleString():0)+' <span style="font-size:.7rem;color:var(--fg3)">kg</span></div><div class="po-sl">Best Day</div></div><div class="po-si"><div class="po-sv">'+chartData.length+' <span style="font-size:.7rem;color:var(--fg3)">วัน</span></div><div class="po-sl">Sessions</div></div><div class="po-si"><div class="po-sv '+(diff>=0?"up":"dn")+'">'+(diff>=0?"+":"")+diffPct+'%</div><div class="po-sl">vs Last Session</div></div></div>';

  document.getElementById("tp-progress").innerHTML=html;
  document.querySelectorAll(".po-chip").forEach(function(ch){ ch.addEventListener("click", function(){ poSelectedExercise=this.getAttribute("data-ex"); renderProgress(); }); });
}
